<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOLAR WAR — 어금니별을 지켜라</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Press Start 2P', monospace; background: #000; color: white; min-height: 100vh; overflow: hidden; user-select: none; image-rendering: pixelated; }

        /* ─── Pixel Stars ─── */
        .starfield { position: fixed; inset: 0; z-index: 0; }
        .star { position: absolute; }

        /* ─── Cockpit HUD frame (bottom) ─── */
        .cockpit { position: fixed; bottom: 0; left: 0; right: 0; height: 95px; z-index: 20; background: linear-gradient(0deg, #060e1a 0%, #0c1e3a 40%, #122e55 80%, #1a4080 100%); border-top: 4px solid #3399ee; box-shadow: 0 -6px 30px rgba(51,153,238,0.25); }
        .cockpit::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 100%; background: repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(51,153,238,0.06) 60px, rgba(51,153,238,0.06) 62px); }
        .cockpit::after { content: ''; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 180px; height: 3px; background: linear-gradient(90deg, transparent, #3399ee, transparent); border-radius: 2px; }
        .cockpit-panel { position: absolute; top: 20px; display: flex; gap: 4px; }
        .cockpit-panel.left { left: 15px; }
        .cockpit-panel.right { right: 15px; }
        .cockpit-indicator { width: 8px; height: 8px; border: 1px solid #3399ee; animation: blink 1s step-end infinite; }
        .cockpit-indicator:nth-child(1) { background: #44ff44; }
        .cockpit-indicator:nth-child(2) { background: #ff4444; animation-delay: 0.4s; }
        .cockpit-indicator:nth-child(3) { background: #ffcc00; animation-delay: 0.7s; }
        @keyframes blink { 0%,50%{opacity:1}51%,100%{opacity:0.2} }

        /* ─── HUD top (Galaga style) ─── */
        .hud { position: fixed; top: 0; left: 0; right: 0; padding: 12px 20px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 200; }
        .hud-left .label { font-size: 0.5rem; color: #ff4444; }
        .hud-left .value { font-size: 0.7rem; color: #fff; margin-top: 4px; }
        .hud-right .label { font-size: 0.5rem; color: #ff4444; }
        .hud-right .value { font-size: 0.7rem; color: #fff; margin-top: 4px; }
        .hud-center { text-align: center; }
        .hud-center .label { font-size: 0.4rem; color: #4488cc; }
        .hp-bar-outer { width: 100px; height: 8px; background: #111; border: 1px solid #4488cc; margin-top: 4px; }
        .hp-bar-inner { height: 100%; background: #44ff44; transition: width 0.3s, background 0.3s; }
        .hp-bar-inner.low { background: #ff4444; }

        /* ─── Game lanes ─── */
        .game-container { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 95px; }
        .lanes { position: relative; width: 320px; height: calc(100vh - 140px); display: flex; gap: 2px; }
        .lane { flex: 1; position: relative; border-left: 1px solid rgba(68,136,204,0.15); border-right: 1px solid rgba(68,136,204,0.15); overflow: hidden; }
        .hit-zone { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; border-top: 2px solid #4488cc; background: rgba(68,136,204,0.05); }
        .hit-zone.flash { animation: hitFlash 0.1s steps(2); }
        @keyframes hitFlash { 0%{background:rgba(68,200,255,0.3)} 100%{background:rgba(68,136,204,0.05)} }

        /* ─── Key display (aligned with lanes) ─── */
        .key-display { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 320px; display: flex; gap: 2px; z-index: 25; }
        .key-btn { flex: 1; height: 40px; background: #0a1628; border: 2px solid #4488cc; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #4488cc; transition: all 0.08s steps(1); }
        .key-btn.active { background: #4488cc; color: #000; box-shadow: 0 0 8px #4488cc; }
        .key-btn.space-btn { font-size: 0.6rem; }

        /* ─── Notes (pixel aliens falling) ─── */
        .note { position: absolute; width: 70%; left: 15%; height: 36px; display: flex; align-items: center; justify-content: center; will-change: top; image-rendering: pixelated; }
        .note-long { min-height: 90px; }
        .note canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        /* ─── Pixel alien sprites via box-shadow ─── */
        .alien-sprite { width: 4px; height: 4px; background: transparent; position: relative; margin: auto; }

        /* Alien type A - root spider (green/brown branching) */
        .alien-a { box-shadow:
            0px 0px 0 #4a6b2a, 24px 0px 0 #4a6b2a,
            4px 4px 0 #3d5a22, 8px 4px 0 #5a8033, 16px 4px 0 #5a8033, 20px 4px 0 #3d5a22,
            0px 8px 0 #3d5a22, 4px 8px 0 #5a8033, 8px 8px 0 #7acc44, 12px 8px 0 #44ff66, 16px 8px 0 #7acc44, 20px 8px 0 #5a8033, 24px 8px 0 #3d5a22,
            4px 12px 0 #5a8033, 8px 12px 0 #44ff66, 12px 12px 0 #222, 16px 12px 0 #44ff66, 20px 12px 0 #5a8033,
            0px 16px 0 #3d5a22, 4px 16px 0 #5a8033, 8px 16px 0 #3d5a22, 12px 16px 0 #5a8033, 16px 16px 0 #3d5a22, 20px 16px 0 #5a8033, 24px 16px 0 #3d5a22,
            0px 20px 0 #2d4418, 8px 20px 0 #3d5a22, 16px 20px 0 #3d5a22, 24px 20px 0 #2d4418;
        }
        /* Alien type B - virus spore (teal/cyan) */
        .alien-b { box-shadow:
            12px 0px 0 #22aaaa,
            8px 4px 0 #22aaaa, 12px 4px 0 #44ffdd, 16px 4px 0 #22aaaa,
            4px 8px 0 #22aaaa, 8px 8px 0 #44ffdd, 12px 8px 0 #88ffee, 16px 8px 0 #44ffdd, 20px 8px 0 #22aaaa,
            0px 12px 0 #166666, 4px 12px 0 #22aaaa, 8px 12px 0 #44ffdd, 12px 12px 0 #222, 16px 12px 0 #44ffdd, 20px 12px 0 #22aaaa, 24px 12px 0 #166666,
            4px 16px 0 #22aaaa, 8px 16px 0 #166666, 12px 16px 0 #22aaaa, 16px 16px 0 #166666, 20px 16px 0 #22aaaa,
            0px 20px 0 #166666, 12px 20px 0 #166666, 24px 20px 0 #166666;
        }
        /* Alien type C - decay fungus (brown/olive) */
        .alien-c { box-shadow:
            8px 0px 0 #6b5522, 12px 0px 0 #8b7733, 16px 0px 0 #6b5522,
            4px 4px 0 #6b5522, 8px 4px 0 #aa9944, 12px 4px 0 #ccbb55, 16px 4px 0 #aa9944, 20px 4px 0 #6b5522,
            0px 8px 0 #4a3a11, 4px 8px 0 #6b5522, 8px 8px 0 #aa9944, 12px 8px 0 #222, 16px 8px 0 #aa9944, 20px 8px 0 #6b5522, 24px 8px 0 #4a3a11,
            4px 12px 0 #6b5522, 8px 12px 0 #4a3a11, 12px 12px 0 #6b5522, 16px 12px 0 #4a3a11, 20px 12px 0 #6b5522,
            0px 16px 0 #4a3a11, 8px 16px 0 #6b5522, 16px 16px 0 #6b5522, 24px 16px 0 #4a3a11;
        }
        /* Alien type D - mutant tooth (dark green glow) */
        .alien-d { box-shadow:
            8px 0px 0 #2a5a2a, 12px 0px 0 #44aa44, 16px 0px 0 #2a5a2a,
            4px 4px 0 #2a5a2a, 8px 4px 0 #44aa44, 12px 4px 0 #66ff66, 16px 4px 0 #44aa44, 20px 4px 0 #2a5a2a,
            4px 8px 0 #44aa44, 8px 8px 0 #66ff66, 12px 8px 0 #ffffff, 16px 8px 0 #66ff66, 20px 8px 0 #44aa44,
            0px 12px 0 #1a3a1a, 4px 12px 0 #2a5a2a, 8px 12px 0 #44aa44, 12px 12px 0 #44aa44, 16px 12px 0 #44aa44, 20px 12px 0 #2a5a2a, 24px 12px 0 #1a3a1a,
            0px 16px 0 #1a3a1a, 4px 16px 0 #2a5a2a, 20px 16px 0 #2a5a2a, 24px 16px 0 #1a3a1a,
            0px 20px 0 #1a3a1a, 24px 20px 0 #1a3a1a;
        }

        /* ─── Warrior pixel face (bottom right, larger) ─── */
        .warrior-face { position: fixed; bottom: 100px; right: 12px; z-index: 200; text-align: center; }
        .warrior-avatar { width: 90px; height: 90px; background: #0a1020; border: 3px solid #4488cc; border-radius: 8px; overflow: hidden; box-shadow: 0 0 12px rgba(68,136,204,0.3), inset 0 0 20px rgba(0,0,0,0.5); }
        .warrior-avatar img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; filter: brightness(1.1); }
        .warrior-avatar.happy { border-color: #44ff44; box-shadow: 0 0 15px rgba(68,255,68,0.4); }
        .warrior-avatar.sad { border-color: #ff4444; box-shadow: 0 0 15px rgba(255,68,68,0.4); }
        .warrior-name { font-size: 0.35rem; color: #4488cc; margin-top: 4px; }
        /* face states handled by border color */

        /* ─── Combo / Judge ─── */
        .combo { position: fixed; top: 20%; right: 5%; font-size: 0.7rem; color: #ffcc00; z-index: 100; opacity: 0; transition: opacity 0.3s; text-shadow: 2px 2px 0 #884400; }
        .combo.show { opacity: 1; }
        .judge { position: fixed; top: 38%; left: 50%; transform: translateX(-50%); font-size: 0.8rem; z-index: 100; opacity: 0; pointer-events: none; }
        .judge.perfect { color: #ffcc00; text-shadow: 0 0 6px #ffcc00; animation: judgePop 0.4s steps(4) forwards; }
        .judge.great { color: #44ff44; text-shadow: 0 0 6px #44ff44; animation: judgePop 0.4s steps(4) forwards; }
        .judge.miss { color: #ff4444; text-shadow: 0 0 6px #ff4444; animation: judgePop 0.5s steps(4) forwards; }
        @keyframes judgePop { 0%{opacity:0;transform:translateX(-50%) scale(0.5)} 25%{opacity:1;transform:translateX(-50%) scale(1.3)} 100%{opacity:0;transform:translateX(-50%) translateY(-15px) scale(1)} }

        /* ─── Explosion (pixel burst) ─── */
        .explosion { position: fixed; width: 5px; height: 5px; pointer-events: none; z-index: 50; }
        .explosion .px { position: absolute; width: 4px; height: 4px; animation: pxBurst 0.4s ease-out forwards; }
        @keyframes pxBurst { 0%{transform:translate(0,0);opacity:1} 100%{opacity:0} }
        .damage-flash { position: fixed; inset: 0; background: rgba(255,0,0,0.15); pointer-events: none; z-index: 90; animation: dmgFlash 0.15s steps(2) forwards; }
        @keyframes dmgFlash { 0%{opacity:1} 100%{opacity:0} }

        /* ─── Destruction ─── */
        .destruct-overlay { position: fixed; inset: 0; z-index: 400; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        .destruct-overlay.show { opacity: 1; pointer-events: auto; }
        .destruct-text { font-size: 0.8rem; color: #ff4444; text-shadow: 2px 2px 0 #880000; text-align: center; line-height: 2.5; animation: shake 0.2s steps(2) infinite; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-2px)} }

        /* ─── Intro ─── */
        .intro-overlay { position: fixed; inset: 0; z-index: 600; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; transition: opacity 1s; gap: 1rem; }
        .intro-overlay.hidden { opacity: 0; pointer-events: none; }
        .intro-title { font-size: clamp(1.8rem, 6vw, 3.5rem); color: #ff4444; text-shadow: 3px 3px 0 #880000, 6px 6px 0 #440000; text-align: center; line-height: 1.4; letter-spacing: 0.05em; }
        .intro-subtitle { font-size: clamp(0.5rem, 1.5vw, 0.7rem); color: #ffcc00; text-align: center; margin-top: 0.5rem; }
        .intro-story { font-size: clamp(0.55rem, 1.6vw, 0.75rem); color: rgba(255,255,255,0.7); text-align: center; max-width: 550px; line-height: 2.5; margin-top: 1.5rem; }
        .intro-keys { font-size: 0.4rem; color: #4488cc; margin-top: 1rem; }
        .start-btn { margin-top: 1.5rem; padding: 12px 40px; background: #000; border: 2px solid #ffcc00; color: #ffcc00; font-family: 'Press Start 2P', monospace; font-size: 0.6rem; cursor: pointer; transition: all 0.1s steps(1); }
        .start-btn:hover { background: #ffcc00; color: #000; }

        /* ─── Game Over ─── */
        .screen-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; z-index: 500; transition: opacity 0.5s; }
        .screen-overlay.hidden { opacity: 0; pointer-events: none; }
        .screen-overlay h1 { font-size: clamp(0.8rem, 3vw, 1.5rem); color: #ff4444; text-shadow: 2px 2px 0 #880000; text-align: center; line-height: 2; }
        .screen-overlay .score-big { font-size: 1.2rem; color: #ffcc00; }
        .screen-overlay .subtitle { font-size: 0.5rem; color: rgba(255,255,255,0.5); text-align: center; max-width: 350px; line-height: 2; }
    </style>
</head>
<body>
    <div class="starfield" id="starfield"></div>

    <!-- Planet at bottom (sized to cockpit width, molars cover edges) -->
    <div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:380px;height:200px;z-index:1;pointer-events:none;overflow:hidden;">
        <img src="planet.jpg" alt="Molar Prime Planet" style="width:100%;height:auto;position:absolute;bottom:0;left:0;image-rendering:pixelated;opacity:0.8;">
    </div>

    <!-- Molars covering planet edges (left cluster) -->
    <div style="position:fixed;bottom:30px;left:calc(50% - 200px);z-index:2;pointer-events:none;display:flex;flex-direction:column;gap:0;align-items:flex-end;">
        <img src="molar.png" style="width:38px;image-rendering:pixelated;opacity:0.9;margin-right:5px;">
        <img src="molar.png" style="width:42px;image-rendering:pixelated;opacity:0.8;">
        <img src="molar.png" style="width:36px;image-rendering:pixelated;opacity:0.7;margin-right:8px;">
    </div>
    <!-- Molars covering planet edges (right cluster) -->
    <div style="position:fixed;bottom:30px;left:calc(50% + 155px);z-index:2;pointer-events:none;display:flex;flex-direction:column;gap:0;align-items:flex-start;">
        <img src="molar.png" style="width:40px;image-rendering:pixelated;opacity:0.85;margin-left:3px;">
        <img src="molar.png" style="width:36px;image-rendering:pixelated;opacity:0.75;">
        <img src="molar.png" style="width:42px;image-rendering:pixelated;opacity:0.9;margin-left:6px;">
    </div>

    <!-- Boss alien (top, moves left-right) -->
    <div id="bossContainer" style="position:fixed;top:5px;left:50%;transform:translateX(-50%);width:160px;height:120px;z-index:3;pointer-events:none;animation:bossMove 3s ease-in-out infinite alternate;">
        <img src="boss.png" alt="Cavity Boss" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated;">
    </div>
    <style>
        @keyframes bossMove { 0%{transform:translateX(-50%) translateX(-80px)} 100%{transform:translateX(-50%) translateX(80px)} }
    </style>

    <!-- Molar teeth tightly along cockpit -->
    <div style="position:fixed;bottom:88px;left:calc(50% - 190px);display:flex;gap:1px;align-items:flex-end;z-index:21;pointer-events:none;" id="molarRow">
        <img src="molar.png" style="width:28px;image-rendering:pixelated;opacity:0.7;">
        <img src="molar.png" style="width:32px;image-rendering:pixelated;opacity:0.85;">
        <img src="molar.png" style="width:26px;image-rendering:pixelated;opacity:0.6;">
    </div>
    <div style="position:fixed;bottom:88px;right:calc(50% - 190px);display:flex;gap:1px;align-items:flex-end;z-index:21;pointer-events:none;">
        <img src="molar.png" style="width:30px;image-rendering:pixelated;opacity:0.75;">
        <img src="molar.png" style="width:34px;image-rendering:pixelated;opacity:0.85;">
        <img src="molar.png" style="width:27px;image-rendering:pixelated;opacity:0.6;">
    </div>

    <!-- Cockpit -->
    <div class="cockpit" id="cockpit" style="display:none;">
        <div class="cockpit-panel left"><div class="cockpit-indicator"></div><div class="cockpit-indicator"></div><div class="cockpit-indicator"></div></div>
        <div class="cockpit-panel right"><div class="cockpit-indicator"></div><div class="cockpit-indicator"></div><div class="cockpit-indicator"></div></div>
    </div>

    <!-- HUD -->
    <div class="hud" id="hud" style="display:none;">
        <div class="hud-left"><div class="label">1UP</div><div class="value" id="score">0</div></div>
        <div class="hud-center"><div class="label">MOLAR HP</div><div class="hp-bar-outer"><div class="hp-bar-inner" id="hpFill" style="width:100%"></div></div></div>
        <div class="hud-right"><div class="label">HIGH SCORE</div><div class="value" id="hiScore">0</div></div>
    </div>

    <!-- Warrior Face -->
    <div class="warrior-face" id="warriorFace" style="display:none;">
        <div class="warrior-avatar" id="warriorAvatar"><img src="warrior.gif" alt="Brush One"></div>
        <div class="warrior-name">BRUSH-1</div>
    </div>

    <!-- Combo / Judge -->
    <div class="combo" id="combo">0 COMBO</div>
    <div class="judge" id="judge"></div>

    <!-- Game Area -->
    <div class="game-container" id="gameContainer" style="display:none;">
        <div class="lanes" id="lanes">
            <div class="lane" id="lane0"><div class="hit-zone"></div></div>
            <div class="lane" id="lane1"><div class="hit-zone"></div></div>
            <div class="lane" id="lane2"><div class="hit-zone"></div></div>
            <div class="lane" id="lane3"><div class="hit-zone"></div></div>
        </div>
    </div>
    <div class="key-display" id="keyDisplay" style="display:none;">
        <div class="key-btn space-btn" id="kb0">SPC</div>
        <div class="key-btn" id="kb1">&lt;</div>
        <div class="key-btn" id="kb2">v</div>
        <div class="key-btn" id="kb3">&gt;</div>
    </div>

    <!-- Destruction -->
    <div class="destruct-overlay" id="destructOverlay">
        <div class="destruct-text">MOLAR PRIME<br>HAS FALLEN...</div>
    </div>

    <!-- Intro -->
    <div class="intro-overlay" id="introOverlay">
        <!-- Molar decorations on intro -->
        <div style="position:absolute;bottom:10%;left:8%;opacity:0.6;pointer-events:none;"><img src="molar.png" style="width:60px;image-rendering:pixelated;"></div>
        <div style="position:absolute;bottom:15%;right:10%;opacity:0.5;pointer-events:none;"><img src="molar.png" style="width:50px;image-rendering:pixelated;"></div>
        <div style="position:absolute;top:15%;left:5%;opacity:0.3;pointer-events:none;"><img src="molar.png" style="width:40px;image-rendering:pixelated;"></div>
        <div style="position:absolute;top:20%;right:6%;opacity:0.35;pointer-events:none;"><img src="molar.png" style="width:45px;image-rendering:pixelated;"></div>
        <div style="position:absolute;bottom:35%;left:3%;opacity:0.4;pointer-events:none;"><img src="molar.png" style="width:35px;image-rendering:pixelated;"></div>
        <div class="intro-title">MOLAR<br>WAR</div>
        <div class="intro-subtitle">- 어금니별을 지켜라 -</div>
        <div class="intro-story">충치별에서 보낸 돌연변이 바이러스가 어금니별을 향해 쏟아지고 있다. 감염되면 어금니가 충치 돌연변이로 변해버린다. 칫솔 전사 브러시 원이여, 리듬에 맞춰 바이러스를 격퇴하고 어금니별을 지켜라.</div>
        <div class="intro-keys">[ SPACE ] [ LEFT ] [ DOWN ] [ RIGHT ]</div>
        <button class="start-btn" onclick="startGame()">PUSH START</button>
    </div>

    <!-- Game Over -->
    <div class="screen-overlay hidden" id="gameOverScreen">
        <h1>GAME OVER</h1>
        <div class="score-big" id="finalScore">0</div>
        <p class="subtitle" id="gameOverMsg"></p>
        <button class="start-btn" onclick="showIntro()">CONTINUE?</button>
    </div>

    <script>
        const lanes=document.getElementById('lanes');
        const scoreEl=document.getElementById('score');
        const hpFill=document.getElementById('hpFill');
        const comboEl=document.getElementById('combo');
        const judgeEl=document.getElementById('judge');
        const hud=document.getElementById('hud');
        const gameContainer=document.getElementById('gameContainer');
        const introOverlay=document.getElementById('introOverlay');
        const gameOverScreen=document.getElementById('gameOverScreen');
        const warriorFace=document.getElementById('warriorFace');
        const cockpit=document.getElementById('cockpit');
        const keyDisplay=document.getElementById('keyDisplay');
        const destructOverlay=document.getElementById('destructOverlay');
        const hiScoreEl=document.getElementById('hiScore');

        let score=0,hp=100,combo=0,maxCombo=0,hiScore=parseInt(localStorage.getItem('molar_hi')||'0');
        let isPlaying=false,notes=[],noteInterval=null,audio=null,noteSpeed=2.8;
        hiScoreEl.textContent=hiScore;

        const laneKeys=[' ','ArrowLeft','ArrowDown','ArrowRight'];
        const alienTypes=['alien-a','alien-b','alien-c','alien-d'];

        // ─── Starfield (colored pixel dots like Galaga) ─────
        function createStarfield(){
            const sf=document.getElementById('starfield');
            const colors=['#fff','#fff','#fff','#ff4444','#44ff44','#4488ff','#ffcc00','#ff88ff'];
            for(let i=0;i<200;i++){
                const s=document.createElement('div');s.className='star';
                s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
                const sz=Math.random()<0.8?2:3;
                s.style.width=sz+'px';s.style.height=sz+'px';
                s.style.background=colors[Math.floor(Math.random()*colors.length)];
                s.style.opacity=0.3+Math.random()*0.7;
                sf.appendChild(s);
            }
        }

        // ─── Notes ──────────────────────────────────────────
        function spawnNote(isLong=false){
            if(!isPlaying)return;
            const laneIndex=Math.floor(Math.random()*4);
            const lane=document.getElementById('lane'+laneIndex);
            const noteEl=document.createElement('div');
            const h=isLong?90:36;
            noteEl.className='note'+(isLong?' note-long':'');
            noteEl.style.height=h+'px';
            noteEl.style.top='-50px';

            // Pixel alien sprite
            const sprite=document.createElement('div');
            sprite.className='alien-sprite '+alienTypes[laneIndex];
            noteEl.appendChild(sprite);

            lane.appendChild(noteEl);
            const noteData={el:noteEl,lane:laneIndex,startTime:Date.now(),hit:false,isLong};
            notes.push(noteData);

            const laneHeight=lane.getBoundingClientRect().height||500;
            noteEl.style.transition=`top ${noteSpeed}s linear`;
            requestAnimationFrame(()=>{noteEl.style.top=(laneHeight+50)+'px';});
            setTimeout(()=>{if(!noteData.hit&&isPlaying)handleMiss(noteData);},noteSpeed*1000+200);
        }

        // ─── Input ──────────────────────────────────────────
        function handleKeyDown(e){
            if(!isPlaying)return;
            const ki=laneKeys.indexOf(e.key);
            if(ki===-1)return;
            e.preventDefault();
            document.getElementById('kb'+ki).classList.add('active');
            const hz=document.querySelector(`#lane${ki} .hit-zone`);
            if(hz){hz.classList.remove('flash');void hz.offsetWidth;hz.classList.add('flash');}

            const hitY=lanes.getBoundingClientRect().height-50;
            let closest=null,closestDist=Infinity;
            for(const n of notes){
                if(n.hit||n.lane!==ki)continue;
                const r=n.el.getBoundingClientRect(),lr=lanes.getBoundingClientRect();
                const ny=r.top-lr.top+r.height/2;
                const d=Math.abs(ny-hitY);
                if(d<closestDist){closestDist=d;closest=n;}
            }
            if(closest&&closestDist<85){
                closest.hit=true;closest.el.remove();
                if(closestDist<18){score+=100+combo*5;combo++;showJudge('perfect','PERFECT');spawnExplosion(closest.lane);setFace('happy');}
                else if(closestDist<45){score+=50+combo*2;combo++;showJudge('great','GREAT');setFace('happy');}
                else{score+=20;combo++;showJudge('great','OK');setFace('happy');}
                if(combo>maxCombo)maxCombo=combo;
                updateHUD();
            }
        }
        function handleKeyUp(e){const ki=laneKeys.indexOf(e.key);if(ki>=0)document.getElementById('kb'+ki).classList.remove('active');}

        function handleMiss(note){
            if(note.hit)return;note.hit=true;note.el.remove();
            hp-=8;combo=0;showJudge('miss','MISS');showDamageFlash();setFace('sad');updateHUD();
            if(hp<=0){hp=0;endGame(false);}
        }

        // ─── Face ───────────────────────────────────────────
        let faceTimeout=null;
        function setFace(type){
            const avatar=document.getElementById('warriorAvatar');
            avatar.className='warrior-avatar'+(type==='happy'?' happy':type==='sad'?' sad':'');
            clearTimeout(faceTimeout);
            faceTimeout=setTimeout(()=>{avatar.className='warrior-avatar';},700);
        }

        // ─── Effects ────────────────────────────────────────
        function showJudge(t,txt){judgeEl.textContent=txt;judgeEl.className='judge';void judgeEl.offsetWidth;judgeEl.className='judge '+t;}
        function spawnExplosion(li){
            const lane=document.getElementById('lane'+li),rect=lane.getBoundingClientRect();
            const exp=document.createElement('div');exp.className='explosion';
            exp.style.left=(rect.left+rect.width/2)+'px';exp.style.top=(rect.bottom-60)+'px';
            const colors=['#ff4444','#ffcc00','#44ff44','#4488ff','#ff88ff','#fff'];
            for(let i=0;i<8;i++){
                const px=document.createElement('div');px.className='px';
                px.style.background=colors[Math.floor(Math.random()*colors.length)];
                const angle=Math.random()*Math.PI*2,dist=15+Math.random()*25;
                px.style.setProperty('--tx',Math.cos(angle)*dist+'px');
                px.style.setProperty('--ty',Math.sin(angle)*dist+'px');
                px.style.animation=`pxBurst 0.3s ease-out forwards`;
                px.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
                exp.appendChild(px);
            }
            document.body.appendChild(exp);setTimeout(()=>exp.remove(),400);
        }
        function showDamageFlash(){const f=document.createElement('div');f.className='damage-flash';document.body.appendChild(f);setTimeout(()=>f.remove(),150);}
        function updateHUD(){
            scoreEl.textContent=score;
            hpFill.style.width=hp+'%';
            if(hp<30)hpFill.classList.add('low');else hpFill.classList.remove('low');
            if(combo>=5){comboEl.textContent=combo+' COMBO';comboEl.classList.add('show');}else comboEl.classList.remove('show');
        }

        // ─── Game Flow ──────────────────────────────────────
        function showIntro(){gameOverScreen.classList.add('hidden');introOverlay.classList.remove('hidden');}

        function startGame(){
            score=0;hp=100;combo=0;maxCombo=0;notes=[];isPlaying=true;noteSpeed=2.8;
            introOverlay.classList.add('hidden');gameOverScreen.classList.add('hidden');
            hud.style.display='flex';gameContainer.style.display='flex';
            cockpit.style.display='block';warriorFace.style.display='block';keyDisplay.style.display='flex';
            updateHUD();
            document.querySelectorAll('.note').forEach(n=>n.remove());

            // Web Audio API for beat detection
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioEl = new Audio('bgm.mp3');
            audioEl.volume = 0.7;
            audioEl.crossOrigin = 'anonymous';
            audio = audioEl;

            const source = audioCtx.createMediaElementSource(audioEl);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 512;
            source.connect(analyser);
            analyser.connect(audioCtx.destination);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            let lastBeatTime = 0;
            let lastSubBeatTime = 0;
            let beatCount = 0;
            const minBeatGap = 300; // minimum ms between beats
            const minSubGap = 180;
            let energyHistory = [];

            audioEl.play().catch(()=>{});

            function detectBeats() {
                if (!isPlaying) return;
                analyser.getByteFrequencyData(dataArray);

                // Low frequency energy (bass/kick) - bins 0-8 (~0-700Hz)
                let bassEnergy = 0;
                for (let i = 0; i < 8; i++) bassEnergy += dataArray[i];
                bassEnergy /= 8;

                // Mid frequency energy (snare/hi-hat) - bins 8-32
                let midEnergy = 0;
                for (let i = 8; i < 32; i++) midEnergy += dataArray[i];
                midEnergy /= 24;

                // Track energy history for adaptive threshold
                energyHistory.push(bassEnergy);
                if (energyHistory.length > 40) energyHistory.shift();
                const avgEnergy = energyHistory.reduce((a,b) => a+b, 0) / energyHistory.length;

                const now = Date.now();

                // Bass kick detection → spawn note
                if (bassEnergy > avgEnergy * 1.4 && bassEnergy > 120 && (now - lastBeatTime) > minBeatGap) {
                    lastBeatTime = now;
                    beatCount++;
                    spawnNote(false);

                    // Long note every ~12 beats
                    if (beatCount % 12 === 0) spawnNote(true);

                    // Speed up over time
                    if (beatCount === 30) noteSpeed = 2.4;
                    if (beatCount === 60) noteSpeed = 2.0;
                    if (beatCount === 90) noteSpeed = 1.7;
                }

                // Mid energy (snare) → occasional double note
                if (midEnergy > avgEnergy * 1.6 && midEnergy > 130 && (now - lastSubBeatTime) > minSubGap && (now - lastBeatTime) > 150) {
                    lastSubBeatTime = now;
                    if (beatCount > 20 && Math.random() < 0.4) {
                        spawnNote(false);
                    }
                }

                requestAnimationFrame(detectBeats);
            }

            // Start detection after a brief delay for audio to load
            audioEl.addEventListener('playing', () => {
                requestAnimationFrame(detectBeats);
            });

            audioEl.addEventListener('ended', () => { if (isPlaying) endGame(true); });
        }

        function endGame(survived){
            isPlaying=false;
            if(audio){audio.pause();audio.currentTime=0;}
            if(score>hiScore){hiScore=score;localStorage.setItem('molar_hi',hiScore);hiScoreEl.textContent=hiScore;}
            hud.style.display='none';gameContainer.style.display='none';
            cockpit.style.display='none';warriorFace.style.display='none';keyDisplay.style.display='none';

            if(!survived){
                destructOverlay.classList.add('show');
                setTimeout(()=>{
                    destructOverlay.classList.remove('show');
                    document.getElementById('finalScore').textContent=score;
                    document.getElementById('gameOverMsg').textContent='MOLAR PRIME DESTROYED  MAX COMBO: '+maxCombo;
                    gameOverScreen.classList.remove('hidden');
                },2500);
            } else {
                document.getElementById('finalScore').textContent=score;
                document.getElementById('gameOverMsg').textContent='MOLAR PRIME DEFENDED!  MAX COMBO: '+maxCombo;
                gameOverScreen.classList.remove('hidden');
            }
        }

        // ─── Init ───────────────────────────────────────────
        createStarfield();
        document.addEventListener('keydown',handleKeyDown);
        document.addEventListener('keyup',handleKeyUp);
    </script>
</body>
</html>
