<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILLIT - Not Cute Anymore</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --text-dark: #2c2424;
            --text-muted: #6a5e5e;
            --accent: #c4a0a0;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Blurred background from the image */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: url('illit.jpg') center/cover no-repeat;
            filter: blur(60px) saturate(1.2) brightness(1.1);
            transform: scale(1.2);
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: rgba(250, 248, 245, 0.55);
        }

        /* Grain */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* Hero */
        .hero {
            height: 100vh;
            display: grid;
            place-items: center;
            position: relative;
        }

        .hero-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
        }

        .hero-image-wrap {
            position: relative;
            width: min(72vw, 400px);
        }

        .hero-image-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            box-shadow: 0 30px 80px rgba(100, 70, 70, 0.2);
            z-index: -1;
        }

        .hero-image {
            width: 100%;
            border-radius: 12px;
            display: block;
            animation: subtleFloat 8s ease-in-out infinite;
        }

        @keyframes subtleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .hero-text {
            text-align: center;
        }

        .hero-text h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.2rem, 6vw, 4.5rem);
            font-weight: 400;
            font-style: italic;
            letter-spacing: -0.02em;
            line-height: 1.1;
            opacity: 0;
            animation: revealText 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.3s;
        }

        .hero-text .artist {
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 0.75rem;
            font-weight: 300;
            opacity: 0;
            animation: revealText 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.6s;
        }

        @keyframes revealText {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scroll-line {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 48px;
            background: linear-gradient(to bottom, transparent, var(--text-muted));
            animation: scrollPulse 2.5s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) scaleY(1); }
            50% { opacity: 1; transform: translateX(-50%) scaleY(1.2); }
        }

        /* Marquee */
        .marquee-section {
            padding: 3.5rem 0;
            overflow: hidden;
            border-top: 1px solid rgba(196, 160, 160, 0.3);
            border-bottom: 1px solid rgba(196, 160, 160, 0.3);
            backdrop-filter: blur(4px);
        }

        .marquee-track {
            display: flex;
            gap: 3rem;
            animation: marquee 22s linear infinite;
            width: max-content;
        }

        .marquee-track span {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(1.4rem, 3.5vw, 2.5rem);
            font-style: italic;
            color: var(--text-muted);
            white-space: nowrap;
            opacity: 0.6;
        }

        @keyframes marquee {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* Footer */
        .footer-section {
            padding: 8rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        .footer-image {
            width: min(50vw, 260px);
            border-radius: 8px;
            filter: grayscale(0.15);
            transition: filter 0.6s ease, transform 0.6s ease;
            box-shadow: 0 16px 48px rgba(100, 70, 70, 0.15);
        }

        .footer-image:hover {
            filter: grayscale(0);
            transform: scale(1.02);
        }

        .footer-credit {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Cursor glow */
        .glow {
            position: fixed;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(196,160,160,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            transition: left 0.4s ease, top 0.4s ease;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .hero-image-wrap { width: 88vw; }
            .bg-layer { filter: blur(40px) saturate(1.1) brightness(1.15); }
            .bg-overlay { background: rgba(250, 248, 245, 0.6); }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>
    <div class="glow" id="glow"></div>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-inner">
            <div class="hero-image-wrap">
                <img src="illit.jpg" alt="ILLIT - Not Cute Anymore" class="hero-image">
            </div>
            <div class="hero-text">
                <h1>Not Cute Anymore</h1>
                <p class="artist">ILLIT</p>
            </div>
        </div>
        <div class="scroll-line"></div>
    </section>

    <!-- Marquee -->
    <section class="marquee-section">
        <div class="marquee-track">
            <span>Not Cute Anymore</span>
            <span>&middot;</span>
            <span>I'm just kind of easygoing</span>
            <span>&middot;</span>
            <span>I'm not an alien</span>
            <span>&middot;</span>
            <span>Not Cute Anymore</span>
            <span>&middot;</span>
            <span>I'm just kind of easygoing</span>
            <span>&middot;</span>
            <span>I'm not an alien</span>
            <span>&middot;</span>
            <span>Not Cute Anymore</span>
            <span>&middot;</span>
            <span>I'm just kind of easygoing</span>
            <span>&middot;</span>
        </div>
    </section>

    <!-- Footer -->
    <section class="footer-section">
        <img src="illit.jpg" alt="ILLIT" class="footer-image">
        <p class="footer-credit">ILLIT &mdash; Not Cute Anymore &mdash; 2025</p>
    </section>

    <script>
        // Cursor glow
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // Subtle parallax on hero
        const heroImg = document.querySelector('.hero-image');
        window.addEventListener('scroll', () => {
            const y = window.scrollY;
            if (y < window.innerHeight) {
                heroImg.style.transform = `translateY(${-y * 0.04}px)`;
            }
        });
    </script>
</body>
</html>
