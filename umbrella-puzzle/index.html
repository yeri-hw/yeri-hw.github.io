<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbrella Puzzle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #e8e0f0 0%, #f0e8f4 50%, #e4dce8 100%);
            padding: 1.5rem;
            gap: 1.5rem;
        }

        /* Header */
        .header {
            text-align: center;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #4a3a5a;
            margin-bottom: 0.3rem;
        }

        .header p {
            font-size: 0.85rem;
            color: #8a7a9a;
        }

        /* Game info */
        .game-info {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .info-item {
            text-align: center;
        }

        .info-item .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8a7a9a;
        }

        .info-item .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #5a4a6a;
        }

        /* Canvas container */
        .canvas-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 12px 40px rgba(80, 60, 100, 0.15);
        }

        /* Hint: target pattern */
        .hint-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .hint-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8a7a9a;
        }

        canvas.hint {
            box-shadow: 0 4px 16px rgba(80, 60, 100, 0.1);
            cursor: default;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 2rem;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(80, 60, 100, 0.2);
        }

        .btn-primary {
            background: #7a5a9a;
            color: white;
        }

        .btn-secondary {
            background: white;
            color: #5a4a6a;
            border: 1px solid #d4c8e0;
        }

        /* Success overlay */
        .success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(100, 70, 130, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 100;
            animation: fadeIn 0.4s ease;
        }

        .success-overlay.show {
            display: flex;
        }

        .success-overlay h2 {
            font-size: 2rem;
            color: white;
        }

        .success-overlay p {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Rotation animation hint */
        .rotate-hint {
            position: absolute;
            bottom: -2rem;
            font-size: 0.75rem;
            color: #8a7a9a;
            opacity: 0;
            animation: hintPulse 3s ease-in-out infinite;
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Layout */
        .game-area {
            display: flex;
            align-items: center;
            gap: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (max-width: 600px) {
            .game-area { gap: 1.5rem; }
            .header h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Umbrella Puzzle</h1>
        <p>조각을 클릭해서 회전시켜 원래 우산 패턴을 완성하세요</p>
    </div>

    <div class="game-info">
        <div class="info-item">
            <div class="label">레벨</div>
            <div class="value" id="level">1</div>
        </div>
        <div class="info-item">
            <div class="label">클릭 수</div>
            <div class="value" id="clicks">0</div>
        </div>
        <div class="info-item">
            <div class="label">조각 수</div>
            <div class="value" id="slices">4</div>
        </div>
    </div>

    <div class="game-area">
        <div class="hint-wrap">
            <span class="hint-label">완성 모습</span>
            <canvas id="hintCanvas" class="hint" width="120" height="120"></canvas>
        </div>

        <div class="canvas-wrap">
            <canvas id="gameCanvas" width="320" height="320"></canvas>
            <span class="rotate-hint">클릭하면 조각이 회전해요</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-secondary" onclick="shufflePuzzle()">섞기</button>
        <button class="btn btn-primary" onclick="nextLevel()">다음 레벨</button>
    </div>

    <!-- Success -->
    <div class="success-overlay" id="successOverlay">
        <h2>완성!</h2>
        <p id="successMsg">멋져요! 클릭 N번 만에 완성했어요.</p>
        <button class="btn btn-primary" onclick="nextLevel()">다음 레벨</button>
    </div>

    <script>
        const gameCanvas = document.getElementById('gameCanvas');
        const gameCtx = gameCanvas.getContext('2d');
        const hintCanvas = document.getElementById('hintCanvas');
        const hintCtx = hintCanvas.getContext('2d');

        let currentLevel = 1;
        let numSlices = 4;
        let clicks = 0;
        let sliceRotations = []; // how many positions each slice has been rotated
        let targetColors = [];
        let solved = false;

        // Color palettes per level theme
        const palettes = [
            ['#e8a0b0', '#f0c8d4', '#d488a0', '#f4dce4'], // pink
            ['#a0c8e8', '#c8e0f4', '#88b0d4', '#dceaf4', '#6898b8'], // blue
            ['#c8b0e0', '#e0d0f0', '#a888c8', '#f0e8f8', '#8a68a8', '#d4c0e8'], // purple
            ['#b0d8b0', '#d0ecd0', '#88c088', '#e4f4e4', '#68a868', '#c0e4c0', '#4a8a4a'], // green
            ['#e8c888', '#f4e0b0', '#d4a868', '#f8ecd0', '#c09048', '#ecdcb8', '#a87828', '#f0d898'], // gold
        ];

        // Umbrella rib (spoke) style
        const ribColor = 'rgba(60, 40, 60, 0.3)';
        const centerColor = '#5a4a5a';
        const rimColor = 'rgba(60, 40, 60, 0.15)';

        function getColors(level) {
            const paletteIndex = (level - 1) % palettes.length;
            const palette = palettes[paletteIndex];
            const colors = [];
            for (let i = 0; i < numSlices; i++) {
                colors.push(palette[i % palette.length]);
            }
            return colors;
        }

        function initLevel(level) {
            currentLevel = level;
            numSlices = Math.min(3 + level, 10); // 4, 5, 6... up to 10
            clicks = 0;
            solved = false;
            targetColors = getColors(level);
            sliceRotations = new Array(numSlices).fill(0);

            document.getElementById('level').textContent = level;
            document.getElementById('clicks').textContent = 0;
            document.getElementById('slices').textContent = numSlices;
            document.getElementById('successOverlay').classList.remove('show');

            drawUmbrella(hintCtx, 60, 60, 55, targetColors, new Array(numSlices).fill(0), numSlices, true);
            shufflePuzzle();
        }

        function shufflePuzzle() {
            clicks = 0;
            solved = false;
            document.getElementById('clicks').textContent = 0;
            document.getElementById('successOverlay').classList.remove('show');

            // Random rotations, ensure at least one is not 0
            let allZero = true;
            for (let i = 0; i < numSlices; i++) {
                sliceRotations[i] = Math.floor(Math.random() * numSlices);
                if (sliceRotations[i] !== 0) allZero = false;
            }
            if (allZero) {
                sliceRotations[0] = 1 + Math.floor(Math.random() * (numSlices - 1));
            }

            drawGame();
        }

        function drawUmbrella(ctx, cx, cy, radius, colors, rotations, slices, isHint) {
            const size = isHint ? 120 : 320;
            ctx.clearRect(0, 0, size, size);

            const anglePerSlice = (Math.PI * 2) / slices;

            // Draw slices
            for (let i = 0; i < slices; i++) {
                // The color index for this visual position considers rotation
                const colorIndex = (i - rotations[i] + slices * 10) % slices;
                const startAngle = i * anglePerSlice - Math.PI / 2;
                const endAngle = startAngle + anglePerSlice;

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[colorIndex];
                ctx.fill();

                // Rib line
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(
                    cx + Math.cos(startAngle) * radius,
                    cy + Math.sin(startAngle) * radius
                );
                ctx.strokeStyle = ribColor;
                ctx.lineWidth = isHint ? 1 : 2;
                ctx.stroke();
            }

            // Outer rim
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.strokeStyle = rimColor;
            ctx.lineWidth = isHint ? 2 : 4;
            ctx.stroke();

            // Scalloped edge (umbrella curves)
            ctx.beginPath();
            for (let i = 0; i < slices; i++) {
                const startAngle = i * anglePerSlice - Math.PI / 2;
                const midAngle = startAngle + anglePerSlice / 2;
                const endAngle = startAngle + anglePerSlice;

                const x1 = cx + Math.cos(startAngle) * radius;
                const y1 = cy + Math.sin(startAngle) * radius;
                const x2 = cx + Math.cos(endAngle) * radius;
                const y2 = cy + Math.sin(endAngle) * radius;

                // Control point pushed inward for scallop
                const cpDist = radius * 0.88;
                const cpx = cx + Math.cos(midAngle) * cpDist;
                const cpy = cy + Math.sin(midAngle) * cpDist;

                if (i === 0) ctx.moveTo(x1, y1);
                ctx.quadraticCurveTo(cpx, cpy, x2, y2);
            }
            ctx.strokeStyle = 'rgba(60, 40, 60, 0.25)';
            ctx.lineWidth = isHint ? 1.5 : 3;
            ctx.stroke();

            // Center point (umbrella tip)
            ctx.beginPath();
            ctx.arc(cx, cy, isHint ? 4 : 8, 0, Math.PI * 2);
            ctx.fillStyle = centerColor;
            ctx.fill();

            // Inner ring
            ctx.beginPath();
            ctx.arc(cx, cy, isHint ? 8 : 16, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(60, 40, 60, 0.2)';
            ctx.lineWidth = isHint ? 1 : 2;
            ctx.stroke();
        }

        function drawGame() {
            drawUmbrella(gameCtx, 160, 160, 148, targetColors, sliceRotations, numSlices, false);

            // Highlight borders between slices if not solved
            if (!solved) {
                const anglePerSlice = (Math.PI * 2) / numSlices;
                for (let i = 0; i < numSlices; i++) {
                    const startAngle = i * anglePerSlice - Math.PI / 2;

                    // Subtle divider to show clickable areas
                    gameCtx.beginPath();
                    gameCtx.moveTo(160, 160);
                    gameCtx.lineTo(
                        160 + Math.cos(startAngle) * 148,
                        160 + Math.sin(startAngle) * 148
                    );
                    gameCtx.strokeStyle = 'rgba(255,255,255,0.4)';
                    gameCtx.lineWidth = 1;
                    gameCtx.stroke();
                }
            }
        }

        function getClickedSlice(x, y) {
            const cx = 160, cy = 160;
            const dx = x - cx, dy = y - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 148 || dist < 16) return -1;

            let angle = Math.atan2(dy, dx) + Math.PI / 2;
            if (angle < 0) angle += Math.PI * 2;

            const sliceIndex = Math.floor(angle / (Math.PI * 2 / numSlices));
            return sliceIndex % numSlices;
        }

        function checkSolved() {
            return sliceRotations.every(r => r % numSlices === 0);
        }

        gameCanvas.addEventListener('click', (e) => {
            if (solved) return;

            const rect = gameCanvas.getBoundingClientRect();
            const scaleX = 320 / rect.width;
            const scaleY = 320 / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            const sliceIndex = getClickedSlice(x, y);
            if (sliceIndex < 0) return;

            // Rotate this slice by one position
            sliceRotations[sliceIndex] = (sliceRotations[sliceIndex] + 1) % numSlices;
            clicks++;
            document.getElementById('clicks').textContent = clicks;

            drawGame();

            if (checkSolved()) {
                solved = true;
                setTimeout(() => {
                    document.getElementById('successMsg').textContent =
                        `멋져요! ${clicks}번 만에 완성했어요.`;
                    document.getElementById('successOverlay').classList.add('show');
                }, 300);
            }
        });

        // Hover effect
        gameCanvas.addEventListener('mousemove', (e) => {
            if (solved) {
                gameCanvas.style.cursor = 'default';
                return;
            }
            const rect = gameCanvas.getBoundingClientRect();
            const scaleX = 320 / rect.width;
            const scaleY = 320 / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            const slice = getClickedSlice(x, y);
            gameCanvas.style.cursor = slice >= 0 ? 'pointer' : 'default';
        });

        function nextLevel() {
            initLevel(currentLevel + 1);
        }

        // Start
        initLevel(1);
    </script>
</body>
</html>
