<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Different Umbrella</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* ─── Text Pattern ─── */
        .text-pattern {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .text-pattern span {
            position: absolute;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            color: rgba(255, 255, 255, 0.92);
            white-space: nowrap;
        }

        @keyframes rainDiag {
            from { transform: translate(0, -30%); }
            to { transform: translate(-15%, 5%); }
        }
        @keyframes rainReverse {
            from { transform: translate(-15%, -30%); }
            to { transform: translate(0%, 5%); }
        }
        @keyframes pulseConcentric {
            0%, 100% { transform: scale(0.92); }
            50% { transform: scale(1.08); }
        }
        @keyframes waveMove {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-8%); }
        }
        @keyframes expandCircle {
            0%, 100% { transform: translate(-25%, -25%) scale(0.95); }
            50% { transform: translate(-25%, -25%) scale(1.1); }
        }

        /* ─── HUD ─── */
        .hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
        }
        .hud-left { display: flex; gap: 2rem; align-items: baseline; }
        .hud-label { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
        .hud-value { font-size: 1.4rem; font-weight: 900; }
        .hud-timer { font-size: 2.2rem; font-weight: 900; font-variant-numeric: tabular-nums; }
        .hud-timer.urgent { color: #ff4444; animation: timerBlink 0.35s ease-in-out infinite; }
        @keyframes timerBlink { 0%,100%{opacity:1} 50%{opacity:0.2} }
        .lives { display: flex; gap: 6px; }
        .life-dot { width: 10px; height: 10px; border-radius: 50%; background: white; transition: opacity 0.3s, transform 0.3s; }
        .life-dot.lost { opacity: 0.15; transform: scale(0.6); }

        /* ─── Umbrella ─── */
        .umbrella-field { position: fixed; inset: 0; z-index: 10; }
        .umbrella {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: opacity 0.15s ease;
            will-change: transform;
        }
        .umbrella:hover { opacity: 0.6; z-index: 50; }
        .umbrella:active { opacity: 0.4; }
        .umbrella.pop-out { animation: popOut 0.25s ease forwards; }
        @keyframes popOut { from{transform:scale(1);opacity:1} to{transform:scale(0);opacity:0} }
        .umbrella svg { width: 100%; height: 100%; display: block; }

        /* ─── Feedback ─── */
        .feedback { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: clamp(2.5rem,7vw,5rem); font-weight: 900; pointer-events: none; z-index: 300; opacity: 0; letter-spacing: 0.05em; }
        .feedback.correct { color: white; animation: fbPop 0.6s ease forwards; }
        .feedback.wrong { color: white; animation: fbPop 0.6s ease forwards; }
        .feedback.miss { color: rgba(255,255,255,0.6); animation: fbPop 0.8s ease forwards; }
        @keyframes fbPop { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)} 30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 100%{opacity:0;transform:translate(-50%,-50%) scale(1) translateY(-20px)} }

        /* ─── Screens ─── */
        .screen-overlay {
            position: fixed; inset: 0;
            background: #0a0a0a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 1.5rem; z-index: 500;
            transition: opacity 0.4s ease;
            overflow: hidden;
        }
        .screen-overlay.hidden { opacity: 0; pointer-events: none; }
        .screen-overlay h1 { font-size: clamp(2.5rem,9vw,6rem); font-weight: 900; letter-spacing: -0.02em; line-height: 0.95; text-align: center; text-transform: uppercase; z-index: 10; position: relative; }
        .screen-overlay h1 .accent { opacity: 0.5; }
        .screen-overlay .subtitle { font-size: clamp(0.85rem,2.5vw,1.2rem); font-weight: 300; color: rgba(255,255,255,0.5); text-align: center; max-width: 340px; line-height: 1.6; z-index: 10; position: relative; }
        .screen-overlay .score-big { font-size: 3rem; font-weight: 900; z-index: 10; position: relative; }
        .start-btn { margin-top: 2rem; padding: 1rem 3.5rem; background: white; color: #0a0a0a; border: none; border-radius: 0; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 900; cursor: pointer; transition: transform 0.2s, background 0.2s; letter-spacing: 0.15em; text-transform: uppercase; z-index: 10; position: relative; }
        .start-btn:hover { transform: scale(1.05); background: #eee; }

        /* ─── Start Screen Umbrellas (polka dot grid) ─── */
        .start-umbrellas {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .start-umbrella {
            position: absolute;
            border-radius: 50%;
        }
        .start-umbrella svg { width: 100%; height: 100%; }

        /* ─── Start Screen Rain Text ─── */
        .start-rain {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .rain-col {
            position: absolute;
            top: -100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: rainFall linear infinite;
        }

        .rain-col span {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
        }

        @keyframes rainFall {
            from { transform: translateY(0); }
            to { transform: translateY(100vh); }
        }
    </style>
</head>
<body>

    <!-- Text pattern background (game) -->
    <div class="text-pattern" id="textPattern"></div>

    <!-- HUD -->
    <div class="hud" id="hud" style="display:none;">
        <div class="hud-left">
            <div><div class="hud-label">SCORE</div><div class="hud-value" id="score">0</div></div>
            <div><div class="hud-label">ROUND</div><div class="hud-value" id="round">1</div></div>
            <div class="lives"><div class="life-dot" id="life1"></div><div class="life-dot" id="life2"></div><div class="life-dot" id="life3"></div></div>
        </div>
        <div class="hud-timer" id="timer">3.0</div>
    </div>

    <!-- Umbrella field -->
    <div class="umbrella-field" id="field"></div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Start screen -->
    <div class="screen-overlay" id="startScreen">
        <div class="start-rain" id="startRain"></div>
        <div class="start-umbrellas" id="startUmbrellas"></div>
        <h1>FIND THE<br><span class="accent">DIFFERENT</span><br>UMBRELLA.</h1>
        <p class="subtitle">우산들 속에 하나만 달라요<br>사라지기 전에 빠르게 찾아 클릭!</p>
        <button class="start-btn" onclick="startGame()">START</button>
    </div>

    <!-- Game Over screen -->
    <div class="screen-overlay hidden" id="gameOverScreen">
        <h1>GAME<br><span class="accent">OVER</span></h1>
        <div class="score-big" id="finalScore">0</div>
        <p class="subtitle" id="gameOverMsg">ROUND 1</p>
        <button class="start-btn" onclick="startGame()">RETRY</button>
    </div>

    <script>
        const field = document.getElementById('field');
        const scoreEl = document.getElementById('score');
        const roundEl = document.getElementById('round');
        const timerEl = document.getElementById('timer');
        const feedbackEl = document.getElementById('feedback');
        const hud = document.getElementById('hud');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const textPattern = document.getElementById('textPattern');

        let score = 0, round = 0, lives = 3, timeLeft = 0;
        let timerInterval = null, isPlaying = false, differentId = -1;
        let umbrellaData = [], animFrame = null;

        const popColors = ['#ff3b3b','#2979ff','#ffd600','#00e676','#ff6d00','#d500f9','#00bcd4','#ff1744','#76ff03','#651fff'];
        const BG_COLOR = '#0a0a0a';
        const patternTexts = ['FIND DIFFERENT','UMBRELLA','NOT THE SAME','LOOK CLOSER','FIND IT'];

        // ─── Start screen setup ─────────────────────────────────
        function setupStartScreen() {
            // Polka-dot grid of umbrellas (like the reference poster)
            const container = document.getElementById('startUmbrellas');
            container.innerHTML = '';
            const colors = ['#ff3b3b','#2979ff','#ffd600','#00e676','#ff6d00','#d500f9','#00bcd4','#ff1744','#651fff','#76ff03'];
            const W = window.innerWidth;
            const H = window.innerHeight;
            const size = Math.min(W, H) * 0.16;
            const cols = Math.floor(W / (size * 1.1));
            const rows = Math.floor(H / (size * 1.1));
            const gapX = W / cols;
            const gapY = H / rows;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const el = document.createElement('div');
                    el.className = 'start-umbrella';
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    // Offset odd rows like the reference
                    const offsetX = (r % 2) * (gapX * 0.4);
                    el.style.left = (c * gapX + offsetX + (gapX - size) / 2) + 'px';
                    el.style.top = (r * gapY + (gapY - size) / 2) + 'px';
                    const color = colors[(r * cols + c) % colors.length];
                    el.innerHTML = createUmbrellaSVG(8, color, 0);
                    container.appendChild(el);
                }
            }

            // Rain text columns
            generateStartRain();
        }

        function generateStartRain() {
            const container = document.getElementById('startRain');
            container.innerHTML = '';
            const W = window.innerWidth;
            const text = 'FIND DIFFERENT UMBRELLA';
            const chars = text.split('');
            const colCount = Math.floor(W / 50);

            for (let i = 0; i < colCount; i++) {
                const col = document.createElement('div');
                col.className = 'rain-col';
                col.style.left = (i * 50 + Math.random() * 20) + 'px';
                const duration = 2 + Math.random() * 2;
                const delay = Math.random() * -4;
                col.style.animationDuration = duration + 's';
                col.style.animationDelay = delay + 's';

                // Fill column with characters
                const charCount = 20 + Math.floor(Math.random() * 10);
                for (let j = 0; j < charCount; j++) {
                    const span = document.createElement('span');
                    span.textContent = chars[(i + j) % chars.length];
                    if (span.textContent === ' ') span.textContent = '·';
                    col.appendChild(span);
                }
                container.appendChild(col);
            }
        }

        // ─── Text Pattern (game) ────────────────────────────────
        function generateTextPattern(round) {
            textPattern.innerHTML = '';
            const W = window.innerWidth;
            const H = window.innerHeight;
            const patternType = round % 5;
            const text = patternTexts[round % patternTexts.length];
            const chars = text.split('');

            const container = document.createElement('div');
            container.style.position = 'absolute';
            container.style.inset = '-40% -40%';
            container.style.width = '180%';
            container.style.height = '180%';

            const animations = [
                'rainDiag 3s linear infinite',
                'pulseConcentric 2.5s ease-in-out infinite',
                'waveMove 3s ease-in-out infinite',
                'rainReverse 3s linear infinite',
                'expandCircle 3s ease-in-out infinite'
            ];
            container.style.animation = animations[patternType];

            const rowGap = 44;
            const colGap = 28;
            const rows = Math.floor(H * 1.8 / rowGap);
            const cols = Math.floor(W * 1.8 / colGap);

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const charIndex = (row * cols + col) % chars.length;
                    const char = chars[charIndex];
                    if (char === ' ') continue;

                    let x = col * colGap;
                    let y = row * rowGap;
                    let show = false;

                    switch (patternType) {
                        case 0:
                            show = Math.abs((col - row * 0.6) % 12) < 4;
                            break;
                        case 1:
                            const cx = cols/2, cy = rows/2;
                            const dist = Math.abs(col-cx) + Math.abs(row-cy);
                            show = (Math.floor(dist) % 9) < 3;
                            break;
                        case 2:
                            const wave = Math.sin(col * 0.08) * 12;
                            show = Math.abs(row - rows/2 - wave) < 4;
                            break;
                        case 3:
                            show = Math.abs((col + row * 0.6) % 12) < 4;
                            break;
                        case 4:
                            const dx = col - cols/2;
                            const dy = (row - rows/2) * 1.5;
                            const r = Math.sqrt(dx*dx + dy*dy);
                            show = (Math.floor(r) % 10) < 3;
                            break;
                    }

                    if (show) {
                        const span = document.createElement('span');
                        span.textContent = char;
                        span.style.left = x + 'px';
                        span.style.top = y + 'px';
                        container.appendChild(span);
                    }
                }
            }
            textPattern.appendChild(container);
        }

        // ─── Umbrella ───────────────────────────────────────────
        function getUmbrellaSize() {
            const base = Math.min(window.innerWidth, window.innerHeight);
            return Math.floor(base * 0.16);
        }

        function createUmbrellaSVG(ribs, fillColor, ribOffset) {
            const cx = 50, cy = 50, r = 48;
            let paths = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fillColor}" />`;
            for (let i = 0; i < ribs; i++) {
                const angle = (i * 360 / ribs + ribOffset) * Math.PI / 180;
                const x2 = cx + Math.cos(angle) * r;
                const y2 = cy + Math.sin(angle) * r;
                paths += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="${BG_COLOR}" stroke-width="1.5"/>`;
            }
            return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
        }

        function getCount(round) {
            if (round <= 2) return 10;
            if (round <= 5) return 14;
            if (round <= 9) return 18;
            return 22;
        }

        function getTimeLimit(round) {
            if (round <= 2) return 3.5;
            if (round <= 4) return 3.0;
            if (round <= 7) return 2.5;
            if (round <= 10) return 2.0;
            if (round <= 14) return 1.7;
            return 1.3;
        }

        function getDifference(round) {
            const ribs = 8;
            const ci = Math.floor(Math.random() * popColors.length);
            const nc = popColors[ci];
            if (round <= 3) {
                let di = (ci + 3 + Math.floor(Math.random()*4)) % popColors.length;
                return { normal:{ribs,color:nc,offset:0}, different:{ribs,color:popColors[di],offset:0} };
            } else if (round <= 6) {
                const c = [{normal:{ribs,color:nc,offset:0},different:{ribs:ribs+2,color:nc,offset:0}},{normal:{ribs,color:nc,offset:0},different:{ribs:ribs-2,color:nc,offset:0}}];
                return c[Math.floor(Math.random()*c.length)];
            } else if (round <= 10) {
                const c = [{normal:{ribs,color:nc,offset:0},different:{ribs,color:nc,offset:360/ribs/2}},{normal:{ribs,color:nc,offset:0},different:{ribs:ribs+1,color:nc,offset:0}}];
                return c[Math.floor(Math.random()*c.length)];
            } else {
                const c = [{normal:{ribs,color:nc,offset:0},different:{ribs,color:nc,offset:15}},{normal:{ribs:10,color:nc,offset:0},different:{ribs:11,color:nc,offset:0}}];
                return c[Math.floor(Math.random()*c.length)];
            }
        }

        function placeUmbrellas(count, size) {
            const positions = [], pad = 10;
            for (let i = 0; i < count; i++) {
                let placed = false;
                for (let a = 0; a < 200; a++) {
                    const x = pad + Math.random()*(window.innerWidth-size-pad*2);
                    const y = pad + Math.random()*(window.innerHeight-size-pad*2);
                    let overlap = false;
                    for (const p of positions) { if (Math.sqrt((x-p.x)**2+(y-p.y)**2) < size*0.75) { overlap=true; break; } }
                    if (!overlap) { positions.push({x,y}); placed=true; break; }
                }
                if (!placed) positions.push({x:pad+Math.random()*(window.innerWidth-size-pad*2),y:pad+Math.random()*(window.innerHeight-size-pad*2)});
            }
            return positions;
        }

        function spawnRound() {
            round++;
            roundEl.textContent = round;
            generateTextPattern(round);
            const count = getCount(round), size = getUmbrellaSize();
            const diff = getDifference(round), positions = placeUmbrellas(count, size);
            field.innerHTML = '';
            umbrellaData = [];
            differentId = Math.floor(Math.random()*count);
            for (let i = 0; i < count; i++) {
                const pos = positions[i], isDiff = (i===differentId);
                const props = isDiff ? diff.different : diff.normal;
                const el = document.createElement('div');
                el.className = 'umbrella';
                el.style.width = size+'px'; el.style.height = size+'px';
                el.style.left = pos.x+'px'; el.style.top = pos.y+'px';
                el.innerHTML = createUmbrellaSVG(props.ribs, props.color, props.offset);
                el.addEventListener('click', () => handleClick(i, el));
                field.appendChild(el);
                const speed = 0.4+Math.random()*0.6, angle = Math.random()*Math.PI*2;
                umbrellaData.push({el,x:pos.x,y:pos.y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,size});
            }
            startFloating();
            timeLeft = getTimeLimit(round);
            timerEl.textContent = timeLeft.toFixed(1);
            timerEl.classList.remove('urgent');
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1; if (timeLeft<=0) timeLeft=0;
                timerEl.textContent = timeLeft.toFixed(1);
                if (timeLeft<=1.0) timerEl.classList.add('urgent');
                if (timeLeft<=0) { clearInterval(timerInterval); handleMiss(); }
            }, 100);
        }

        function startFloating() {
            cancelAnimationFrame(animFrame);
            const W=window.innerWidth, H=window.innerHeight;
            function animate() {
                umbrellaData.forEach(u => {
                    u.x+=u.vx; u.y+=u.vy;
                    if (u.x<=0||u.x+u.size>=W) u.vx*=-1;
                    if (u.y<=0||u.y+u.size>=H) u.vy*=-1;
                    u.x=Math.max(0,Math.min(W-u.size,u.x));
                    u.y=Math.max(0,Math.min(H-u.size,u.y));
                    u.el.style.left=u.x+'px'; u.el.style.top=u.y+'px';
                });
                if (isPlaying) animFrame=requestAnimationFrame(animate);
            }
            animFrame=requestAnimationFrame(animate);
        }

        function handleClick(id, el) {
            if (!isPlaying) return;
            clearInterval(timerInterval);
            if (id===differentId) {
                score += Math.ceil(timeLeft*10)+round*2;
                scoreEl.textContent = score;
                showFeedback('correct','NICE');
                el.style.opacity='0.5';
                setTimeout(()=>popOutAll(()=>spawnRound()),450);
            } else {
                showFeedback('wrong','MISS');
                lives--; updateLives();
                el.style.opacity='0.3';
                setTimeout(()=>el.style.opacity='1',200);
                if (lives<=0) setTimeout(()=>endGame(),350);
            }
        }

        function handleMiss() {
            if (!isPlaying) return;
            lives--; updateLives();
            showFeedback('miss','TIME');
            const ce = umbrellaData[differentId]?.el;
            if (ce) ce.style.opacity='0.5';
            if (lives<=0) setTimeout(()=>endGame(),500);
            else setTimeout(()=>popOutAll(()=>spawnRound()),700);
        }

        function popOutAll(cb) {
            umbrellaData.forEach((u,i)=>setTimeout(()=>u.el.classList.add('pop-out'),i*20));
            setTimeout(cb, umbrellaData.length*20+300);
        }

        function updateLives() {
            for (let i=1;i<=3;i++) { const d=document.getElementById('life'+i); if(i>lives) d.classList.add('lost'); else d.classList.remove('lost'); }
        }

        function showFeedback(type, text) {
            feedbackEl.textContent=text;
            feedbackEl.className='feedback';
            void feedbackEl.offsetWidth;
            feedbackEl.className='feedback '+type;
        }

        function startGame() {
            score=0; round=0; lives=3; isPlaying=true;
            scoreEl.textContent='0'; roundEl.textContent='1';
            timerEl.classList.remove('urgent'); updateLives();
            hud.style.display='flex';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            field.innerHTML='';
            setTimeout(()=>spawnRound(),250);
        }

        function endGame() {
            isPlaying=false; clearInterval(timerInterval); cancelAnimationFrame(animFrame);
            document.getElementById('finalScore').textContent=score;
            document.getElementById('gameOverMsg').textContent=`ROUND ${round}`;
            gameOverScreen.classList.remove('hidden');
        }

        window.addEventListener('resize',()=>{
            if(isPlaying){umbrellaData.forEach(u=>{u.x=Math.min(u.x,window.innerWidth-u.size);u.y=Math.min(u.y,window.innerHeight-u.size);});generateTextPattern(round);}
        });

        // Init start screen
        setupStartScreen();
    </script>
</body>
</html>
