<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Different Umbrella</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        /* Text pattern background */
        .text-pattern {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .text-pattern span {
            position: absolute;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.06);
            white-space: nowrap;
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
        }

        .hud-left {
            display: flex;
            gap: 2rem;
            align-items: baseline;
        }

        .hud-label {
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
        }

        .hud-value {
            font-size: 1.4rem;
            font-weight: 900;
            color: white;
        }

        .hud-timer {
            font-size: 2.2rem;
            font-weight: 900;
            color: white;
            font-variant-numeric: tabular-nums;
        }

        .hud-timer.urgent {
            color: #ff4444;
            animation: timerBlink 0.35s ease-in-out infinite;
        }

        @keyframes timerBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .lives {
            display: flex;
            gap: 6px;
        }

        .life-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            transition: opacity 0.3s, transform 0.3s;
        }

        .life-dot.lost {
            opacity: 0.15;
            transform: scale(0.6);
        }

        /* Umbrella field */
        .umbrella-field {
            position: fixed;
            inset: 0;
            z-index: 10;
        }

        /* Umbrella - no blink, instant appear */
        .umbrella {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s ease;
            will-change: transform;
        }

        .umbrella:hover {
            transform: scale(1.06) !important;
            z-index: 50;
            outline: 2px solid rgba(255,255,255,0.5);
            outline-offset: 3px;
        }

        .umbrella:active {
            transform: scale(0.94) !important;
        }

        .umbrella.pop-out {
            animation: popOut 0.25s ease forwards;
        }

        @keyframes popOut {
            from { transform: scale(1); opacity: 1; }
            to { transform: scale(0); opacity: 0; }
        }

        .umbrella svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Feedback */
        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 900;
            pointer-events: none;
            z-index: 300;
            opacity: 0;
            letter-spacing: 0.05em;
        }

        .feedback.correct {
            color: white;
            animation: fbPop 0.6s ease forwards;
        }

        .feedback.wrong {
            color: white;
            animation: fbPop 0.6s ease forwards;
        }

        .feedback.miss {
            color: rgba(255,255,255,0.6);
            animation: fbPop 0.8s ease forwards;
        }

        @keyframes fbPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-20px); }
        }

        /* Screens */
        .screen-overlay {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            z-index: 500;
            transition: opacity 0.4s ease;
        }

        .screen-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .screen-overlay h1 {
            font-size: clamp(2.5rem, 9vw, 6rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 0.95;
            text-align: center;
            text-transform: uppercase;
        }

        .screen-overlay h1 .accent {
            color: white;
            opacity: 0.5;
        }

        .screen-overlay .subtitle {
            font-size: clamp(0.85rem, 2.5vw, 1.2rem);
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            text-align: center;
            max-width: 340px;
            line-height: 1.6;
            letter-spacing: 0.02em;
        }

        .screen-overlay .score-big {
            font-size: 3rem;
            font-weight: 900;
            color: white;
            letter-spacing: -0.02em;
        }

        .start-btn {
            margin-top: 2rem;
            padding: 1rem 3.5rem;
            background: white;
            color: #0a0a0a;
            border: none;
            border-radius: 0;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .start-btn:hover {
            transform: scale(1.05);
            background: #eee;
        }

        /* Decorative colored dots on start screen */
        .start-dot {
            position: absolute;
            border-radius: 50%;
        }

        .start-dot-1 { width: 60px; height: 60px; background: #ff3b3b; top: 8%; left: 6%; }
        .start-dot-2 { width: 45px; height: 45px; background: #2979ff; top: 12%; right: 10%; }
        .start-dot-3 { width: 55px; height: 55px; background: #ffd600; bottom: 15%; left: 12%; }
        .start-dot-4 { width: 40px; height: 40px; background: #00e676; bottom: 20%; right: 8%; }
        .start-dot-5 { width: 50px; height: 50px; background: #ff6d00; top: 45%; left: 4%; }
        .start-dot-6 { width: 35px; height: 35px; background: #d500f9; top: 55%; right: 5%; }
    </style>
</head>
<body>

    <!-- Text pattern background (generated by JS per stage) -->
    <div class="text-pattern" id="textPattern"></div>

    <!-- HUD -->
    <div class="hud" id="hud" style="display:none;">
        <div class="hud-left">
            <div>
                <div class="hud-label">SCORE</div>
                <div class="hud-value" id="score">0</div>
            </div>
            <div>
                <div class="hud-label">ROUND</div>
                <div class="hud-value" id="round">1</div>
            </div>
            <div class="lives">
                <div class="life-dot" id="life1"></div>
                <div class="life-dot" id="life2"></div>
                <div class="life-dot" id="life3"></div>
            </div>
        </div>
        <div class="hud-timer" id="timer">3.0</div>
    </div>

    <!-- Umbrella field -->
    <div class="umbrella-field" id="field"></div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Start screen -->
    <div class="screen-overlay" id="startScreen">
        <div class="start-dot start-dot-1"></div>
        <div class="start-dot start-dot-2"></div>
        <div class="start-dot start-dot-3"></div>
        <div class="start-dot start-dot-4"></div>
        <div class="start-dot start-dot-5"></div>
        <div class="start-dot start-dot-6"></div>
        <h1>FIND THE<br><span class="accent">DIFFERENT</span><br>UMBRELLA.</h1>
        <p class="subtitle">우산들 속에 하나만 달라요<br>사라지기 전에 빠르게 찾아 클릭!</p>
        <button class="start-btn" onclick="startGame()">START</button>
    </div>

    <!-- Game Over screen -->
    <div class="screen-overlay hidden" id="gameOverScreen">
        <h1>GAME<br><span class="accent">OVER</span></h1>
        <div class="score-big" id="finalScore">0</div>
        <p class="subtitle" id="gameOverMsg">ROUND 1</p>
        <button class="start-btn" onclick="startGame()">RETRY</button>
    </div>

    <script>
        const field = document.getElementById('field');
        const scoreEl = document.getElementById('score');
        const roundEl = document.getElementById('round');
        const timerEl = document.getElementById('timer');
        const feedbackEl = document.getElementById('feedback');
        const hud = document.getElementById('hud');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const textPattern = document.getElementById('textPattern');

        let score = 0;
        let round = 0;
        let lives = 3;
        let timeLeft = 0;
        let timerInterval = null;
        let isPlaying = false;
        let differentId = -1;
        let umbrellaData = [];
        let animFrame = null;

        // Pop colors
        const popColors = [
            '#ff3b3b', '#2979ff', '#ffd600', '#00e676',
            '#ff6d00', '#d500f9', '#00bcd4', '#ff1744',
            '#76ff03', '#651fff',
        ];

        const BG_COLOR = '#0a0a0a';

        // ─── Text Pattern Generators ───────────────────────────────

        const patternTexts = [
            'FIND DIFFERENT',
            'UMBRELLA',
            'NOT THE SAME',
            'LOOK CLOSER',
            'FIND IT',
        ];

        function generateTextPattern(round) {
            textPattern.innerHTML = '';
            const W = window.innerWidth;
            const H = window.innerHeight;
            const patternType = round % 5; // 5 different patterns
            const text = patternTexts[round % patternTexts.length];
            const chars = text.split('');

            const rows = Math.floor(H / 22);
            const cols = Math.floor(W / 14);

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const charIndex = (row * cols + col) % chars.length;
                    const char = chars[charIndex];
                    if (char === ' ') continue;

                    let x, y, show;

                    switch (patternType) {
                        case 0: // Diagonal rain (top-left to bottom-right)
                            x = col * 14;
                            y = row * 22;
                            show = Math.abs((col - row * 0.6) % 8) < 3;
                            break;

                        case 1: // Concentric circles (diamond)
                            x = col * 14;
                            y = row * 22;
                            const cx = cols / 2, cy = rows / 2;
                            const dist = Math.abs(col - cx) + Math.abs(row - cy);
                            show = (Math.floor(dist) % 6) < 2;
                            break;

                        case 2: // Wave (sine)
                            x = col * 14;
                            y = row * 22;
                            const wave = Math.sin(col * 0.15) * 8;
                            show = Math.abs(row - rows / 2 - wave) < 3;
                            break;

                        case 3: // Reverse diagonal (top-right to bottom-left)
                            x = col * 14;
                            y = row * 22;
                            show = Math.abs((col + row * 0.6) % 8) < 3;
                            break;

                        case 4: // Expanding circles from center
                            x = col * 14;
                            y = row * 22;
                            const dx = col - cols / 2;
                            const dy = (row - rows / 2) * 1.5;
                            const r = Math.sqrt(dx * dx + dy * dy);
                            show = (Math.floor(r) % 7) < 2;
                            break;
                    }

                    if (show) {
                        const span = document.createElement('span');
                        span.textContent = char;
                        span.style.left = x + 'px';
                        span.style.top = y + 'px';
                        textPattern.appendChild(span);
                    }
                }
            }
        }

        // ─── Umbrella ──────────────────────────────────────────────

        function getUmbrellaSize() {
            const base = Math.min(window.innerWidth, window.innerHeight);
            return Math.floor(base * 0.13);
        }

        function createUmbrellaSVG(ribs, fillColor, ribOffset) {
            const cx = 50, cy = 50, r = 48;
            let paths = '';

            paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fillColor}" />`;

            for (let i = 0; i < ribs; i++) {
                const angle = (i * 360 / ribs + ribOffset) * Math.PI / 180;
                const x2 = cx + Math.cos(angle) * r;
                const y2 = cy + Math.sin(angle) * r;
                paths += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="${BG_COLOR}" stroke-width="1.5"/>`;
            }

            return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
        }

        function getCount(round) {
            if (round <= 2) return 10;
            if (round <= 5) return 14;
            if (round <= 9) return 18;
            return 22;
        }

        function getTimeLimit(round) {
            if (round <= 2) return 3.5;
            if (round <= 4) return 3.0;
            if (round <= 7) return 2.5;
            if (round <= 10) return 2.0;
            if (round <= 14) return 1.7;
            return 1.3;
        }

        function getDifference(round) {
            const ribs = 8;
            const colorIndex = Math.floor(Math.random() * popColors.length);
            const normalColor = popColors[colorIndex];

            if (round <= 3) {
                let diffColorIndex = (colorIndex + 3 + Math.floor(Math.random() * 4)) % popColors.length;
                return {
                    normal: { ribs, color: normalColor, offset: 0 },
                    different: { ribs, color: popColors[diffColorIndex], offset: 0 }
                };
            } else if (round <= 6) {
                const choices = [
                    { normal: { ribs, color: normalColor, offset: 0 }, different: { ribs: ribs + 2, color: normalColor, offset: 0 } },
                    { normal: { ribs, color: normalColor, offset: 0 }, different: { ribs: ribs - 2, color: normalColor, offset: 0 } }
                ];
                return choices[Math.floor(Math.random() * choices.length)];
            } else if (round <= 10) {
                const choices = [
                    { normal: { ribs, color: normalColor, offset: 0 }, different: { ribs, color: normalColor, offset: 360 / ribs / 2 } },
                    { normal: { ribs, color: normalColor, offset: 0 }, different: { ribs: ribs + 1, color: normalColor, offset: 0 } }
                ];
                return choices[Math.floor(Math.random() * choices.length)];
            } else {
                const choices = [
                    { normal: { ribs, color: normalColor, offset: 0 }, different: { ribs, color: normalColor, offset: 15 } },
                    { normal: { ribs: 10, color: normalColor, offset: 0 }, different: { ribs: 11, color: normalColor, offset: 0 } }
                ];
                return choices[Math.floor(Math.random() * choices.length)];
            }
        }

        function placeUmbrellas(count, size) {
            const positions = [];
            const padding = 10;
            const maxAttempts = 200;

            for (let i = 0; i < count; i++) {
                let placed = false;
                for (let a = 0; a < maxAttempts; a++) {
                    const x = padding + Math.random() * (window.innerWidth - size - padding * 2);
                    const y = padding + Math.random() * (window.innerHeight - size - padding * 2);

                    let overlap = false;
                    for (const p of positions) {
                        const dx = x - p.x;
                        const dy = y - p.y;
                        if (Math.sqrt(dx * dx + dy * dy) < size * 0.75) {
                            overlap = true;
                            break;
                        }
                    }

                    if (!overlap) {
                        positions.push({ x, y });
                        placed = true;
                        break;
                    }
                }
                if (!placed) {
                    positions.push({
                        x: padding + Math.random() * (window.innerWidth - size - padding * 2),
                        y: padding + Math.random() * (window.innerHeight - size - padding * 2)
                    });
                }
            }
            return positions;
        }

        function spawnRound() {
            round++;
            roundEl.textContent = round;

            // Generate new text pattern for this stage
            generateTextPattern(round);

            const count = getCount(round);
            const size = getUmbrellaSize();
            const diff = getDifference(round);
            const positions = placeUmbrellas(count, size);

            field.innerHTML = '';
            umbrellaData = [];
            differentId = Math.floor(Math.random() * count);

            for (let i = 0; i < count; i++) {
                const pos = positions[i];
                const isDiff = (i === differentId);
                const props = isDiff ? diff.different : diff.normal;

                const el = document.createElement('div');
                el.className = 'umbrella';
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.left = pos.x + 'px';
                el.style.top = pos.y + 'px';
                el.innerHTML = createUmbrellaSVG(props.ribs, props.color, props.offset);

                el.addEventListener('click', () => handleClick(i, el));
                field.appendChild(el);

                // Movement
                const speed = 0.4 + Math.random() * 0.6;
                const angle = Math.random() * Math.PI * 2;
                umbrellaData.push({
                    el, x: pos.x, y: pos.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size
                });
            }

            startFloating();

            // Timer
            timeLeft = getTimeLimit(round);
            timerEl.textContent = timeLeft.toFixed(1);
            timerEl.classList.remove('urgent');

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) timeLeft = 0;
                timerEl.textContent = timeLeft.toFixed(1);
                if (timeLeft <= 1.0) timerEl.classList.add('urgent');
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleMiss();
                }
            }, 100);
        }

        function startFloating() {
            cancelAnimationFrame(animFrame);
            const W = window.innerWidth;
            const H = window.innerHeight;

            function animate() {
                umbrellaData.forEach(u => {
                    u.x += u.vx;
                    u.y += u.vy;
                    if (u.x <= 0 || u.x + u.size >= W) u.vx *= -1;
                    if (u.y <= 0 || u.y + u.size >= H) u.vy *= -1;
                    u.x = Math.max(0, Math.min(W - u.size, u.x));
                    u.y = Math.max(0, Math.min(H - u.size, u.y));
                    u.el.style.left = u.x + 'px';
                    u.el.style.top = u.y + 'px';
                });
                if (isPlaying) animFrame = requestAnimationFrame(animate);
            }
            animFrame = requestAnimationFrame(animate);
        }

        function handleClick(id, el) {
            if (!isPlaying) return;
            clearInterval(timerInterval);

            if (id === differentId) {
                score += Math.ceil(timeLeft * 10) + round * 2;
                scoreEl.textContent = score;
                showFeedback('correct', 'NICE');
                el.style.transform = 'scale(1.15)';
                el.style.outline = '3px solid rgba(255,255,255,0.7)';
                el.style.outlineOffset = '4px';
                setTimeout(() => popOutAll(() => spawnRound()), 450);
            } else {
                showFeedback('wrong', 'MISS');
                lives--;
                updateLives();
                el.style.opacity = '0.3';
                setTimeout(() => el.style.opacity = '1', 200);
                if (lives <= 0) {
                    setTimeout(() => endGame(), 350);
                }
            }
        }

        function handleMiss() {
            if (!isPlaying) return;
            lives--;
            updateLives();
            showFeedback('miss', 'TIME');

            const correctEl = umbrellaData[differentId]?.el;
            if (correctEl) {
                correctEl.style.outline = '3px solid rgba(255,255,255,0.5)';
                correctEl.style.outlineOffset = '4px';
                correctEl.style.transform = 'scale(1.1)';
            }

            if (lives <= 0) {
                setTimeout(() => endGame(), 500);
            } else {
                setTimeout(() => popOutAll(() => spawnRound()), 700);
            }
        }

        function popOutAll(callback) {
            umbrellaData.forEach((u, i) => {
                setTimeout(() => u.el.classList.add('pop-out'), i * 20);
            });
            setTimeout(callback, umbrellaData.length * 20 + 300);
        }

        function updateLives() {
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('life' + i);
                if (i > lives) dot.classList.add('lost');
                else dot.classList.remove('lost');
            }
        }

        function showFeedback(type, text) {
            feedbackEl.textContent = text;
            feedbackEl.className = 'feedback';
            void feedbackEl.offsetWidth;
            feedbackEl.className = 'feedback ' + type;
        }

        function startGame() {
            score = 0;
            round = 0;
            lives = 3;
            isPlaying = true;

            scoreEl.textContent = '0';
            roundEl.textContent = '1';
            timerEl.classList.remove('urgent');
            updateLives();

            hud.style.display = 'flex';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            field.innerHTML = '';

            setTimeout(() => spawnRound(), 250);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            cancelAnimationFrame(animFrame);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverMsg').textContent = `ROUND ${round}`;
            gameOverScreen.classList.remove('hidden');
        }

        window.addEventListener('resize', () => {
            if (isPlaying) {
                umbrellaData.forEach(u => {
                    u.x = Math.min(u.x, window.innerWidth - u.size);
                    u.y = Math.min(u.y, window.innerHeight - u.size);
                });
                generateTextPattern(round);
            }
        });
    </script>
</body>
</html>
