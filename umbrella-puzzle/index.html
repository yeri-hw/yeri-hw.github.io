<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Different Umbrella</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        /* Background typography */
        .bg-text {
            position: fixed;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.04);
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }

        .bg-text-1 {
            top: 8%;
            left: 5%;
            font-size: clamp(2rem, 6vw, 5rem);
        }

        .bg-text-2 {
            top: 35%;
            right: 5%;
            font-size: clamp(1.5rem, 4vw, 3.5rem);
        }

        .bg-text-3 {
            bottom: 15%;
            left: 8%;
            font-size: clamp(2.5rem, 7vw, 6rem);
        }

        .bg-text-4 {
            bottom: 40%;
            right: 10%;
            font-size: clamp(1rem, 3vw, 2.5rem);
            font-weight: 300;
        }

        /* Game prompt text */
        .prompt-text {
            position: fixed;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.08);
            pointer-events: none;
            z-index: 0;
        }

        .prompt-1 {
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.8rem, 5vw, 4rem);
        }

        .prompt-2 {
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1rem, 2.5vw, 2rem);
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .hud-left {
            display: flex;
            gap: 2rem;
            align-items: baseline;
        }

        .hud-label {
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        .hud-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
        }

        .hud-timer {
            font-size: 1.8rem;
            font-weight: 900;
            color: #8bb8e8;
            font-variant-numeric: tabular-nums;
        }

        .hud-timer.urgent {
            color: #e88b8b;
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Game area */
        .game-area {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .umbrella-grid {
            display: grid;
            gap: 1.2rem;
            padding: 2rem;
        }

        /* Umbrella (top view = circle with ribs) */
        .umbrella {
            position: relative;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.3s ease;
            opacity: 0;
            transform: scale(0.7);
        }

        .umbrella.appear {
            opacity: 1;
            transform: scale(1);
        }

        .umbrella.disappear {
            opacity: 0;
            transform: scale(0.5);
        }

        .umbrella:hover {
            transform: scale(1.08);
        }

        .umbrella:active {
            transform: scale(0.95);
        }

        .umbrella svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Feedback */
        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 900;
            pointer-events: none;
            z-index: 200;
            opacity: 0;
        }

        .feedback.correct {
            color: #8bb8e8;
            animation: feedbackPop 0.6s ease forwards;
        }

        .feedback.wrong {
            color: #e88b8b;
            animation: feedbackPop 0.6s ease forwards;
        }

        .feedback.miss {
            color: rgba(255,255,255,0.3);
            animation: feedbackPop 0.8s ease forwards;
        }

        @keyframes feedbackPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-20px); }
        }

        /* Start / Game Over screen */
        .screen-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            z-index: 500;
            transition: opacity 0.4s ease;
        }

        .screen-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .screen-overlay h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .screen-overlay h1 span {
            color: #8bb8e8;
        }

        .screen-overlay p {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            font-weight: 300;
            max-width: 320px;
            text-align: center;
            line-height: 1.6;
        }

        .screen-overlay .score-display {
            font-size: 1.5rem;
            font-weight: 700;
            color: #8bb8e8;
        }

        .start-btn {
            margin-top: 1rem;
            padding: 0.8rem 2.5rem;
            background: #8bb8e8;
            color: #0a0a0a;
            border: none;
            border-radius: 3rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            background: #a8cef0;
        }

        /* Decorative circles in background */
        .deco-circle {
            position: fixed;
            border-radius: 50%;
            background: rgba(139, 184, 232, 0.06);
            pointer-events: none;
            z-index: 0;
        }

        .deco-1 { width: 300px; height: 300px; top: -80px; right: -60px; }
        .deco-2 { width: 180px; height: 180px; bottom: 10%; left: -40px; }
        .deco-3 { width: 100px; height: 100px; top: 40%; right: 10%; }
    </style>
</head>
<body>

    <!-- Background decorative -->
    <div class="deco-circle deco-1"></div>
    <div class="deco-circle deco-2"></div>
    <div class="deco-circle deco-3"></div>

    <!-- Background text -->
    <div class="bg-text bg-text-1">find</div>
    <div class="bg-text bg-text-2">different</div>
    <div class="bg-text bg-text-3">umbrella</div>
    <div class="bg-text bg-text-4">빠르게 찾아봐</div>

    <div class="prompt-text prompt-1">다른 우산을 찾아</div>
    <div class="prompt-text prompt-2">사라지기 전에</div>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-left">
            <div>
                <div class="hud-label">score</div>
                <div class="hud-value" id="score">0</div>
            </div>
            <div>
                <div class="hud-label">round</div>
                <div class="hud-value" id="round">1</div>
            </div>
        </div>
        <div class="hud-timer" id="timer">3.0</div>
    </div>

    <!-- Game area -->
    <div class="game-area">
        <div class="umbrella-grid" id="grid"></div>
    </div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Start screen -->
    <div class="screen-overlay" id="startScreen">
        <h1>Find the <span>Different</span></h1>
        <p>우산들 중에서 하나만 다릅니다.<br>사라지기 전에 빠르게 찾아 클릭하세요!</p>
        <button class="start-btn" onclick="startGame()">시작하기</button>
    </div>

    <!-- Game Over screen -->
    <div class="screen-overlay hidden" id="gameOverScreen">
        <h1>Game <span>Over</span></h1>
        <div class="score-display" id="finalScore">0점</div>
        <p id="gameOverMsg">3번 놓치면 게임이 끝나요.</p>
        <button class="start-btn" onclick="startGame()">다시 하기</button>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const roundEl = document.getElementById('round');
        const timerEl = document.getElementById('timer');
        const feedback = document.getElementById('feedback');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');

        let score = 0;
        let round = 0;
        let lives = 3;
        let timeLeft = 0;
        let timerInterval = null;
        let roundTimeout = null;
        let isPlaying = false;
        let differentIndex = -1;

        // Umbrella color - base is pastel blue like the reference
        const baseHue = 210;

        function createUmbrellaSVG(ribs, color, ribOffset, hasDot) {
            const size = 100;
            const cx = 50, cy = 50, r = 46;
            let paths = '';

            // Main circle
            paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" />`;

            // Ribs (spokes)
            for (let i = 0; i < ribs; i++) {
                const angle = (i * 360 / ribs + ribOffset) * Math.PI / 180;
                const x2 = cx + Math.cos(angle) * r;
                const y2 = cy + Math.sin(angle) * r;
                paths += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>`;
            }

            // Center dot
            if (hasDot) {
                paths += `<circle cx="${cx}" cy="${cy}" r="5" fill="rgba(0,0,0,0.2)" />`;
            } else {
                paths += `<circle cx="${cx}" cy="${cy}" r="3.5" fill="rgba(0,0,0,0.15)" />`;
            }

            // Outer rim
            paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="2"/>`;

            return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
        }

        function getGridConfig(round) {
            if (round <= 3) return { cols: 3, rows: 3, count: 9 };
            if (round <= 6) return { cols: 4, rows: 3, count: 12 };
            if (round <= 10) return { cols: 4, rows: 4, count: 16 };
            return { cols: 5, rows: 4, count: 20 };
        }

        function getTimeLimit(round) {
            // Starts generous, gets tighter
            if (round <= 2) return 3.0;
            if (round <= 5) return 2.5;
            if (round <= 8) return 2.0;
            if (round <= 12) return 1.6;
            return 1.2;
        }

        function getDifference(round) {
            // Types of differences, gets subtler over rounds
            const ribs = 6 + Math.floor(round / 3);
            const baseColor = `hsl(${baseHue}, 55%, 72%)`;

            // Possible differences
            const diffs = [];

            if (round <= 3) {
                // Obvious: different color
                diffs.push({
                    normal: { ribs, color: baseColor, offset: 0, dot: false },
                    different: { ribs, color: `hsl(${baseHue + 40}, 55%, 72%)`, offset: 0, dot: false }
                });
            } else if (round <= 6) {
                // Medium: different rib count
                diffs.push({
                    normal: { ribs, color: baseColor, offset: 0, dot: false },
                    different: { ribs: ribs + 2, color: baseColor, offset: 0, dot: false }
                });
                diffs.push({
                    normal: { ribs, color: baseColor, offset: 0, dot: false },
                    different: { ribs, color: `hsl(${baseHue + 20}, 55%, 72%)`, offset: 0, dot: false }
                });
            } else if (round <= 10) {
                // Hard: rotated ribs or subtle hue
                diffs.push({
                    normal: { ribs, color: baseColor, offset: 0, dot: false },
                    different: { ribs, color: baseColor, offset: 360 / ribs / 2, dot: false }
                });
                diffs.push({
                    normal: { ribs, color: baseColor, offset: 0, dot: false },
                    different: { ribs, color: `hsl(${baseHue + 12}, 55%, 72%)`, offset: 0, dot: false }
                });
            } else {
                // Very hard: tiny details
                diffs.push({
                    normal: { ribs, color: baseColor, offset: 0, dot: false },
                    different: { ribs, color: baseColor, offset: 0, dot: true }
                });
                diffs.push({
                    normal: { ribs, color: baseColor, offset: 0, dot: false },
                    different: { ribs, color: `hsl(${baseHue + 8}, 52%, 72%)`, offset: 0, dot: false }
                });
                diffs.push({
                    normal: { ribs, color: baseColor, offset: 0, dot: false },
                    different: { ribs: ribs + 1, color: baseColor, offset: 0, dot: false }
                });
            }

            return diffs[Math.floor(Math.random() * diffs.length)];
        }

        function spawnRound() {
            round++;
            roundEl.textContent = round;

            const config = getGridConfig(round);
            const diff = getDifference(round);
            const umbrellaSize = config.cols <= 3 ? 90 : config.cols <= 4 ? 75 : 62;

            grid.style.gridTemplateColumns = `repeat(${config.cols}, ${umbrellaSize}px)`;
            grid.innerHTML = '';

            differentIndex = Math.floor(Math.random() * config.count);

            for (let i = 0; i < config.count; i++) {
                const el = document.createElement('div');
                el.className = 'umbrella';
                el.style.width = umbrellaSize + 'px';
                el.style.height = umbrellaSize + 'px';

                const isDiff = (i === differentIndex);
                const props = isDiff ? diff.different : diff.normal;
                el.innerHTML = createUmbrellaSVG(props.ribs, props.color, props.offset, props.dot);

                el.addEventListener('click', () => handleClick(i, el));
                grid.appendChild(el);

                // Staggered appear
                setTimeout(() => el.classList.add('appear'), i * 30);
            }

            // Start timer
            timeLeft = getTimeLimit(round);
            timerEl.textContent = timeLeft.toFixed(1);
            timerEl.classList.remove('urgent');

            clearInterval(timerInterval);
            clearTimeout(roundTimeout);

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) timeLeft = 0;
                timerEl.textContent = timeLeft.toFixed(1);

                if (timeLeft <= 1.0) {
                    timerEl.classList.add('urgent');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleMiss();
                }
            }, 100);
        }

        function handleClick(index, el) {
            if (!isPlaying) return;
            clearInterval(timerInterval);
            clearTimeout(roundTimeout);

            if (index === differentIndex) {
                // Correct!
                score += Math.ceil(timeLeft * 10);
                scoreEl.textContent = score;
                showFeedback('correct', '○');
                el.style.transform = 'scale(1.2)';
                el.style.boxShadow = '0 0 30px rgba(139,184,232,0.5)';
                setTimeout(() => disappearAll(() => spawnRound()), 500);
            } else {
                // Wrong
                showFeedback('wrong', '✕');
                lives--;
                if (lives <= 0) {
                    setTimeout(() => endGame(), 400);
                } else {
                    // Brief shake, continue
                    el.style.transform = 'translateX(-5px)';
                    setTimeout(() => el.style.transform = '', 100);
                }
            }
        }

        function handleMiss() {
            if (!isPlaying) return;
            lives--;
            showFeedback('miss', '놓쳤어!');

            // Flash the correct one
            const umbrellas = grid.querySelectorAll('.umbrella');
            if (umbrellas[differentIndex]) {
                umbrellas[differentIndex].style.boxShadow = '0 0 20px rgba(232,139,139,0.6)';
                umbrellas[differentIndex].style.transform = 'scale(1.15)';
            }

            if (lives <= 0) {
                setTimeout(() => endGame(), 600);
            } else {
                setTimeout(() => disappearAll(() => spawnRound()), 800);
            }
        }

        function disappearAll(callback) {
            const umbrellas = grid.querySelectorAll('.umbrella');
            umbrellas.forEach((el, i) => {
                setTimeout(() => el.classList.add('disappear'), i * 20);
            });
            setTimeout(callback, umbrellas.length * 20 + 300);
        }

        function showFeedback(type, text) {
            feedback.textContent = text;
            feedback.className = 'feedback ' + type;
            // Force reflow for re-animation
            void feedback.offsetWidth;
            feedback.className = 'feedback ' + type;
        }

        function startGame() {
            score = 0;
            round = 0;
            lives = 3;
            isPlaying = true;

            scoreEl.textContent = '0';
            roundEl.textContent = '1';
            timerEl.classList.remove('urgent');

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            grid.innerHTML = '';
            setTimeout(() => spawnRound(), 300);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            clearTimeout(roundTimeout);

            document.getElementById('finalScore').textContent = score + '점';
            document.getElementById('gameOverMsg').textContent =
                `${round}라운드까지 도달! 3번 놓치면 게임이 끝나요.`;
            gameOverScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
