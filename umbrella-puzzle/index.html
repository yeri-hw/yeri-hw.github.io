<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find the Different Umbrella</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f6f4;
            color: #1a1a1a;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        /* Diagonal hatching text - poster style */
        .hatch-text {
            position: fixed;
            font-weight: 900;
            line-height: 0.9;
            pointer-events: none;
            z-index: 2;
            background: repeating-linear-gradient(
                -45deg,
                #1a1a1a 0px,
                #1a1a1a 1.5px,
                transparent 1.5px,
                transparent 4px
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.7;
        }

        .hatch-1 {
            top: 6%;
            left: 4%;
            font-size: clamp(3rem, 10vw, 8rem);
        }

        .hatch-2 {
            top: 28%;
            left: 2%;
            font-size: clamp(2.5rem, 8vw, 6.5rem);
        }

        .hatch-3 {
            bottom: 12%;
            right: 3%;
            font-size: clamp(2rem, 7vw, 5.5rem);
        }

        .hatch-4 {
            bottom: 32%;
            left: 5%;
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 300;
            opacity: 0.4;
            background: repeating-linear-gradient(
                -45deg,
                #1a1a1a 0px,
                #1a1a1a 1px,
                transparent 1px,
                transparent 3.5px
            );
            -webkit-background-clip: text;
            background-clip: text;
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
            mix-blend-mode: difference;
        }

        .hud-left {
            display: flex;
            gap: 1.5rem;
            align-items: baseline;
        }

        .hud-label {
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
        }

        .hud-value {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
        }

        .hud-timer {
            font-size: 2rem;
            font-weight: 900;
            color: white;
            font-variant-numeric: tabular-nums;
        }

        .hud-timer.urgent {
            animation: timerPulse 0.4s ease-in-out infinite;
        }

        @keyframes timerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .lives {
            display: flex;
            gap: 4px;
        }

        .life-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            transition: opacity 0.3s;
        }

        .life-dot.lost {
            opacity: 0.2;
        }

        /* Floating umbrella container */
        .umbrella-field {
            position: fixed;
            inset: 0;
            z-index: 10;
        }

        /* Individual umbrella */
        .umbrella {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease;
            will-change: transform;
        }

        .umbrella:hover {
            transform: scale(1.06) !important;
        }

        .umbrella:active {
            transform: scale(0.94) !important;
        }

        .umbrella.pop-in {
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .umbrella.pop-out {
            animation: popOut 0.3s ease forwards;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes popOut {
            from { transform: scale(1); opacity: 1; }
            to { transform: scale(0); opacity: 0; }
        }

        .umbrella svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Feedback */
        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            pointer-events: none;
            z-index: 300;
            opacity: 0;
        }

        .feedback.correct {
            color: #4a90d9;
            animation: fbPop 0.7s ease forwards;
        }

        .feedback.wrong {
            color: #d94a4a;
            animation: fbPop 0.7s ease forwards;
        }

        .feedback.miss {
            color: #aaa;
            animation: fbPop 0.9s ease forwards;
        }

        @keyframes fbPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
            25% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-30px); }
        }

        /* Screens */
        .screen-overlay {
            position: fixed;
            inset: 0;
            background: rgba(248, 246, 244, 0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            z-index: 500;
            transition: opacity 0.4s ease;
        }

        .screen-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .screen-overlay h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1;
            text-align: center;
            background: repeating-linear-gradient(
                -45deg,
                #1a1a1a 0px,
                #1a1a1a 1.5px,
                transparent 1.5px,
                transparent 4px
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .screen-overlay .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 300;
            color: #666;
            text-align: center;
            max-width: 360px;
            line-height: 1.5;
        }

        .screen-overlay .score-big {
            font-size: 2.5rem;
            font-weight: 900;
            color: #4a90d9;
        }

        .start-btn {
            margin-top: 1.5rem;
            padding: 1rem 3rem;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            letter-spacing: 0.05em;
        }

        .start-btn:hover {
            transform: scale(1.05);
            background: #333;
        }

        /* Decorative static circles on start screen */
        .start-deco {
            position: absolute;
            border-radius: 50%;
            background: #4a90d9;
            opacity: 0.15;
        }

        .start-deco-1 { width: 200px; height: 200px; top: -40px; right: -40px; }
        .start-deco-2 { width: 140px; height: 140px; bottom: 10%; left: -30px; }
        .start-deco-3 { width: 80px; height: 80px; top: 30%; left: 10%; opacity: 0.1; }
        .start-deco-4 { width: 260px; height: 260px; bottom: -60px; right: 15%; opacity: 0.08; }
    </style>
</head>
<body>

    <!-- Hatching poster text (visible during gameplay) -->
    <div class="hatch-text hatch-1">Find</div>
    <div class="hatch-text hatch-2">Different</div>
    <div class="hatch-text hatch-3">Umbrella.</div>
    <div class="hatch-text hatch-4">사라지기 전에 찾아봐</div>

    <!-- HUD -->
    <div class="hud" id="hud" style="display:none;">
        <div class="hud-left">
            <div>
                <div class="hud-label">score</div>
                <div class="hud-value" id="score">0</div>
            </div>
            <div>
                <div class="hud-label">round</div>
                <div class="hud-value" id="round">1</div>
            </div>
            <div class="lives">
                <div class="life-dot" id="life1"></div>
                <div class="life-dot" id="life2"></div>
                <div class="life-dot" id="life3"></div>
            </div>
        </div>
        <div class="hud-timer" id="timer">3.0</div>
    </div>

    <!-- Umbrella field -->
    <div class="umbrella-field" id="field"></div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Start screen -->
    <div class="screen-overlay" id="startScreen">
        <div class="start-deco start-deco-1"></div>
        <div class="start-deco start-deco-2"></div>
        <div class="start-deco start-deco-3"></div>
        <div class="start-deco start-deco-4"></div>
        <h1>Find the<br>Different<br>Umbrella.</h1>
        <p class="subtitle">우산들 속에 하나만 달라요.<br>사라지기 전에 빠르게 찾아 클릭!</p>
        <button class="start-btn" onclick="startGame()">START</button>
    </div>

    <!-- Game Over screen -->
    <div class="screen-overlay hidden" id="gameOverScreen">
        <h1>Game Over.</h1>
        <div class="score-big" id="finalScore">0</div>
        <p class="subtitle" id="gameOverMsg">라운드 1까지 도달</p>
        <button class="start-btn" onclick="startGame()">RETRY</button>
    </div>

    <script>
        const field = document.getElementById('field');
        const scoreEl = document.getElementById('score');
        const roundEl = document.getElementById('round');
        const timerEl = document.getElementById('timer');
        const feedbackEl = document.getElementById('feedback');
        const hud = document.getElementById('hud');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');

        let score = 0;
        let round = 0;
        let lives = 3;
        let timeLeft = 0;
        let timerInterval = null;
        let isPlaying = false;
        let differentId = -1;
        let umbrellas = [];
        let animFrame = null;

        // Base color
        const baseColor = '#4a90d9';

        function createUmbrellaSVG(ribs, color, ribOffset, ribStyle) {
            const cx = 50, cy = 50, r = 48;
            let paths = '';

            // Fill
            paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" />`;

            // Scalloped edge
            paths += '<path d="';
            for (let i = 0; i < ribs; i++) {
                const a1 = (i * 360 / ribs + ribOffset) * Math.PI / 180;
                const a2 = ((i + 1) * 360 / ribs + ribOffset) * Math.PI / 180;
                const aMid = (a1 + a2) / 2;

                const x1 = cx + Math.cos(a1) * r;
                const y1 = cy + Math.sin(a1) * r;
                const x2 = cx + Math.cos(a2) * r;
                const y2 = cy + Math.sin(a2) * r;
                const cpDist = r * 0.9;
                const cpx = cx + Math.cos(aMid) * cpDist;
                const cpy = cy + Math.sin(aMid) * cpDist;

                if (i === 0) paths += `M${x1},${y1}`;
                paths += ` Q${cpx},${cpy} ${x2},${y2}`;
            }
            paths += `Z" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1.5"/>`;

            // Ribs
            for (let i = 0; i < ribs; i++) {
                const angle = (i * 360 / ribs + ribOffset) * Math.PI / 180;
                const x2 = cx + Math.cos(angle) * (r - 2);
                const y2 = cy + Math.sin(angle) * (r - 2);

                if (ribStyle === 'dashed') {
                    paths += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" stroke-dasharray="3,3"/>`;
                } else {
                    paths += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>`;
                }
            }

            // Center
            paths += `<circle cx="${cx}" cy="${cy}" r="4" fill="rgba(255,255,255,0.4)" />`;
            paths += `<circle cx="${cx}" cy="${cy}" r="2" fill="rgba(255,255,255,0.6)" />`;

            return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
        }

        function getUmbrellaCount(round) {
            if (round <= 2) return 8;
            if (round <= 5) return 12;
            if (round <= 9) return 16;
            return 20;
        }

        function getTimeLimit(round) {
            if (round <= 2) return 3.5;
            if (round <= 4) return 3.0;
            if (round <= 7) return 2.5;
            if (round <= 10) return 2.0;
            if (round <= 14) return 1.6;
            return 1.3;
        }

        function getSizeRange(round) {
            // Returns [min, max] in vw-ish pixels
            const base = Math.min(window.innerWidth, window.innerHeight);
            if (round <= 3) return [base * 0.12, base * 0.22];
            if (round <= 7) return [base * 0.09, base * 0.18];
            return [base * 0.08, base * 0.15];
        }

        function getDifference(round) {
            const ribs = 6 + Math.floor(round / 4);

            if (round <= 2) {
                return {
                    normal: { ribs, color: baseColor, offset: 0, ribStyle: 'solid' },
                    different: { ribs, color: '#d94a6a', offset: 0, ribStyle: 'solid' }
                };
            } else if (round <= 5) {
                return {
                    normal: { ribs, color: baseColor, offset: 0, ribStyle: 'solid' },
                    different: { ribs: ribs + 2, color: baseColor, offset: 0, ribStyle: 'solid' }
                };
            } else if (round <= 8) {
                const choices = [
                    {
                        normal: { ribs, color: baseColor, offset: 0, ribStyle: 'solid' },
                        different: { ribs, color: '#5a78d9', offset: 0, ribStyle: 'solid' }
                    },
                    {
                        normal: { ribs, color: baseColor, offset: 0, ribStyle: 'solid' },
                        different: { ribs, color: baseColor, offset: 360 / ribs / 2, ribStyle: 'solid' }
                    }
                ];
                return choices[Math.floor(Math.random() * choices.length)];
            } else {
                const choices = [
                    {
                        normal: { ribs, color: baseColor, offset: 0, ribStyle: 'solid' },
                        different: { ribs, color: baseColor, offset: 0, ribStyle: 'dashed' }
                    },
                    {
                        normal: { ribs, color: baseColor, offset: 0, ribStyle: 'solid' },
                        different: { ribs: ribs + 1, color: baseColor, offset: 0, ribStyle: 'solid' }
                    },
                    {
                        normal: { ribs, color: baseColor, offset: 0, ribStyle: 'solid' },
                        different: { ribs, color: '#5490c9', offset: 0, ribStyle: 'solid' }
                    }
                ];
                return choices[Math.floor(Math.random() * choices.length)];
            }
        }

        function randomPosition(size) {
            const pad = size / 2;
            return {
                x: pad + Math.random() * (window.innerWidth - size - pad),
                y: pad + Math.random() * (window.innerHeight - size - pad)
            };
        }

        function spawnRound() {
            round++;
            roundEl.textContent = round;

            const count = getUmbrellaCount(round);
            const diff = getDifference(round);
            const [minSize, maxSize] = getSizeRange(round);

            field.innerHTML = '';
            umbrellas = [];
            differentId = Math.floor(Math.random() * count);

            for (let i = 0; i < count; i++) {
                const size = minSize + Math.random() * (maxSize - minSize);
                const pos = randomPosition(size);
                const isDiff = (i === differentId);
                const props = isDiff ? diff.different : diff.normal;

                const el = document.createElement('div');
                el.className = 'umbrella';
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.left = pos.x + 'px';
                el.style.top = pos.y + 'px';
                el.innerHTML = createUmbrellaSVG(props.ribs, props.color, props.offset, props.ribStyle);

                // Movement data
                const speed = 0.3 + Math.random() * 0.5;
                const angle = Math.random() * Math.PI * 2;
                const velX = Math.cos(angle) * speed;
                const velY = Math.sin(angle) * speed;

                el.dataset.id = i;
                el.addEventListener('click', () => handleClick(i, el));

                field.appendChild(el);

                // Staggered pop-in
                setTimeout(() => el.classList.add('pop-in'), i * 40);

                umbrellas.push({ el, x: pos.x, y: pos.y, velX, velY, size });
            }

            // Start floating animation
            startFloating();

            // Start timer
            timeLeft = getTimeLimit(round);
            timerEl.textContent = timeLeft.toFixed(1);
            timerEl.classList.remove('urgent');

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) timeLeft = 0;
                timerEl.textContent = timeLeft.toFixed(1);

                if (timeLeft <= 1.0) timerEl.classList.add('urgent');

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleMiss();
                }
            }, 100);
        }

        function startFloating() {
            cancelAnimationFrame(animFrame);

            function animate() {
                const W = window.innerWidth;
                const H = window.innerHeight;

                umbrellas.forEach(u => {
                    u.x += u.velX;
                    u.y += u.velY;

                    // Bounce off edges
                    if (u.x <= 0 || u.x + u.size >= W) u.velX *= -1;
                    if (u.y <= 0 || u.y + u.size >= H) u.velY *= -1;

                    // Clamp
                    u.x = Math.max(0, Math.min(W - u.size, u.x));
                    u.y = Math.max(0, Math.min(H - u.size, u.y));

                    u.el.style.left = u.x + 'px';
                    u.el.style.top = u.y + 'px';
                });

                if (isPlaying) animFrame = requestAnimationFrame(animate);
            }

            animFrame = requestAnimationFrame(animate);
        }

        function handleClick(id, el) {
            if (!isPlaying) return;
            clearInterval(timerInterval);

            if (id === differentId) {
                score += Math.ceil(timeLeft * 10) + round;
                scoreEl.textContent = score;
                showFeedback('correct', '●');

                el.style.transform = 'scale(1.2)';
                el.style.boxShadow = '0 0 40px rgba(74, 144, 217, 0.5)';

                setTimeout(() => popOutAll(() => spawnRound()), 500);
            } else {
                showFeedback('wrong', '✕');
                lives--;
                updateLives();

                el.style.transform = 'scale(0.9)';
                setTimeout(() => el.style.transform = '', 150);

                if (lives <= 0) {
                    setTimeout(() => endGame(), 400);
                }
            }
        }

        function handleMiss() {
            if (!isPlaying) return;
            lives--;
            updateLives();
            showFeedback('miss', 'TIME');

            // Highlight correct one
            const correctEl = umbrellas[differentId]?.el;
            if (correctEl) {
                correctEl.style.boxShadow = '0 0 30px rgba(217, 74, 74, 0.5)';
                correctEl.style.transform = 'scale(1.15)';
            }

            if (lives <= 0) {
                setTimeout(() => endGame(), 600);
            } else {
                setTimeout(() => popOutAll(() => spawnRound()), 800);
            }
        }

        function popOutAll(callback) {
            umbrellas.forEach((u, i) => {
                setTimeout(() => u.el.classList.add('pop-out'), i * 25);
            });
            setTimeout(callback, umbrellas.length * 25 + 350);
        }

        function updateLives() {
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('life' + i);
                if (i > lives) dot.classList.add('lost');
                else dot.classList.remove('lost');
            }
        }

        function showFeedback(type, text) {
            feedbackEl.textContent = text;
            feedbackEl.className = 'feedback';
            void feedbackEl.offsetWidth;
            feedbackEl.className = 'feedback ' + type;
        }

        function startGame() {
            score = 0;
            round = 0;
            lives = 3;
            isPlaying = true;

            scoreEl.textContent = '0';
            roundEl.textContent = '1';
            timerEl.classList.remove('urgent');
            updateLives();

            hud.style.display = 'flex';
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            field.innerHTML = '';

            setTimeout(() => spawnRound(), 400);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            cancelAnimationFrame(animFrame);

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverMsg').textContent = `라운드 ${round}까지 도달`;
            gameOverScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
